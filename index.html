<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | DONDECOMPRO.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .vista { display: none; }
        .vista.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">DONDECOMPRO<span class="text-indigo-600">.COM</span></h1>
            <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider">Gestión de Rosario de la Frontera</p>
        </div>
        <button onclick="location.reload()" class="bg-rose-500 hover:bg-rose-600 text-white px-6 py-2 rounded-2xl font-bold shadow-lg shadow-rose-100 transition-all">SALIR</button>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 space-y-6">
            <div class="glass p-8 rounded-[2.5rem] shadow-xl border border-white">
                <h3 class="text-xs font-black text-indigo-400 uppercase tracking-[0.2em] mb-6">📦 Nuevo Rubro</h3>
                <div class="flex gap-2">
                    <input type="text" id="nuevo-rubro" placeholder="Ej: Veterinaria" class="flex-1 bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-500 font-bold text-slate-700 transition-all">
                    <button onclick="crearRubro()" class="bg-indigo-600 text-white p-4 rounded-2xl font-black text-xl hover:scale-105 transition-transform">+</button>
                </div>
                
                <div class="mt-8">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase mb-4">Rubros Actuales</h4>
                    <div id="lista-rubros" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8">
            <div class="glass p-8 rounded-[2.5rem] shadow-xl border border-white min-h-[600px]">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <h3 class="text-xs font-black text-emerald-500 uppercase tracking-[0.2em]">🏪 Gestión de Tiendas</h3>
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button onclick="filtrarComercios('todos')" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg hover:bg-white transition-all">Todos</button>
                        <button onclick="filtrarComercios('pendiente')" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg hover:bg-white transition-all">Pendientes</button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                <th class="pb-4 px-2">Información del Local</th>
                                <th class="pb-4 px-2">Estado</th>
                                <th class="pb-4 px-2 text-right">Acciones Administrativas</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-comercios" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = "TU_URL_AQUÍ";
        const SUPABASE_KEY = "TU_ANON_KEY_AQUÍ";
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- GESTIÓN DE RUBROS ---
        async function cargarRubros() {
            const { data, error } = await _client.from('rubros').select('*').order('nombre');
            const contenedor = document.getElementById('lista-rubros');
            contenedor.innerHTML = data.map(r => `
                <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm group">
                    <span class="font-bold text-slate-700 text-sm">${r.nombre}</span>
                    <button onclick="eliminarRubro('${r.id}')" class="text-rose-300 hover:text-rose-500 font-bold opacity-0 group-hover:opacity-100 transition-all">&times;</button>
                </div>
            `).join('');
        }

        async function crearRubro() {
            const input = document.getElementById('nuevo-rubro');
            if(!input.value) return;
            const { error } = await _client.from('rubros').insert([{ nombre: input.value }]);
            if(error) alert("Este rubro ya existe.");
            input.value = "";
            cargarRubros();
        }

        async function eliminarRubro(id) {
            if(confirm("¿Eliminar rubro? Esto afectará a los comercios asociados.")) {
                await _client.from('rubros').delete().eq('id', id);
                cargarRubros();
            }
        }

        // --- GESTIÓN DE COMERCIOS ---
        async function cargarComercios(filtro = 'todos') {
            let query = _client.from('comercios').select('*').order('creado_at', { ascending: false });
            if(filtro === 'pendiente') query = query.eq('estado', 'pendiente');
            
            const { data } = await query;
            const tabla = document.getElementById('tabla-comercios');
            
            tabla.innerHTML = data.map(c => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="py-6 px-2">
                        <div class="font-extrabold text-slate-800 uppercase tracking-tight">${c.nombre_comercio}</div>
                        <div class="text-[10px] font-bold text-indigo-400 italic">${c.rubro_nombre || 'Sin rubro'} • WA: ${c.whatsapp}</div>
                    </td>
                    <td class="py-6 px-2">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase shadow-sm
                            ${c.estado === 'activo' ? 'bg-emerald-100 text-emerald-600' : 
                              c.estado === 'suspendido' ? 'bg-rose-100 text-rose-600' : 'bg-amber-100 text-amber-600'}">
                            ${c.estado}
                        </span>
                    </td>
                    <td class="py-6 px-2 text-right">
                        <div class="flex justify-end gap-2">
                            ${c.estado !== 'activo' ? `
                                <button onclick="actualizarEstado('${c.id}', 'activo')" class="bg-emerald-500 text-white text-[10px] font-black px-3 py-2 rounded-xl hover:shadow-lg transition-all">ACTIVAR</button>
                            ` : `
                                <button onclick="actualizarEstado('${c.id}', 'suspendido')" class="bg-amber-500 text-white text-[10px] font-black px-3 py-2 rounded-xl hover:shadow-lg transition-all">SUSPENDER</button>
                            `}
                            <button onclick="eliminarComercio('${c.id}')" class="bg-slate-100 text-slate-400 text-[10px] font-black px-3 py-2 rounded-xl hover:bg-rose-50 hover:text-rose-500 transition-all">ELIMINAR</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function actualizarEstado(id, nuevoEstado) {
            await _client.from('comercios').update({ estado: nuevoEstado }).eq('id', id);
            cargarComercios();
        }

        async function eliminarComercio(id) {
            if(confirm("¿Eliminar permanentemente este comercio?")) {
                await _client.from('comercios').delete().eq('id', id);
                cargarComercios();
            }
        }

        function filtrarComercios(f) { cargarComercios(f); }

        // INICIO
        window.onload = () => {
            cargarRubros();
            cargarComercios();
        };
    </script>
</body>
</html>
