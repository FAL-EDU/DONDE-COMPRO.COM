<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONDE COMPRO.COM | Rosario de la Frontera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f3f7f6; }
        .vista { display: none; }
        .vista.active { display: block; }
        .card-custom { border-radius: 2.5rem; transition: all 0.3s ease; }
    </style>
</head>
<body>

    <nav class="bg-[#1a1a1a] text-white p-4 sticky top-0 z-[1000] shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tighter cursor-pointer" onclick="location.reload()">DONDE COMPRO.COM</h1>
            <div id="nav-botones">
                <button onclick="abrirModal()" class="bg-amber-500 text-white px-5 py-2 rounded-xl text-xs font-black uppercase">Acceso</button>
            </div>
        </div>
    </nav>

    <div id="vista-admin" class="vista max-w-6xl mx-auto p-6">
        <div class="flex flex-col md:flex-row gap-8 mt-10">
            <div class="md:w-1/3">
                <div class="bg-white p-8 card-custom shadow-lg border-2 border-slate-50 text-center">
                    <span class="text-2xl">📦</span>
                    <h3 class="font-black text-slate-800 uppercase text-[10px] my-4 tracking-widest">Nuevo Rubro</h3>
                    <input type="text" id="input-nuevo-rubro" placeholder="Ej: Ferretería" class="w-full p-4 bg-slate-50 rounded-2xl outline-none mb-4 font-bold text-center border-2 border-transparent focus:border-indigo-500">
                    <button onclick="crearRubro()" class="w-full bg-[#5d58ff] text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg shadow-indigo-100">Agregar Rubro</button>
                </div>
            </div>

            <div class="md:w-2/3 bg-white p-10 card-custom shadow-2xl relative">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="font-black text-slate-800 uppercase italic tracking-tighter">Control de Tiendas</h3>
                    <button onclick="exportarExcel()" class="bg-[#10b981] text-white px-6 py-2 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-emerald-100">Excel</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[9px] text-slate-400 font-black uppercase border-b border-slate-50">
                                <th class="pb-4">Comercio</th>
                                <th class="pb-4 text-center">Estado</th>
                                <th class="pb-4 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-admin-comercios">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-acceso" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl text-center">
            <h3 class="font-black text-slate-800 uppercase mb-6">Acceso Admin</h3>
            <input type="text" id="codigo-inv" placeholder="Código de Invitación" class="w-full p-5 bg-slate-50 rounded-2xl mb-4 font-mono text-center border-2 border-dashed border-slate-200 outline-none">
            <button onclick="validarAdmin()" class="w-full bg-[#1a1a1a] text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Ingresar</button>
            <button onclick="cerrarModal()" class="mt-4 text-slate-400 font-bold text-xs uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        // CREDENCIALES
        const S_URL = "https://mefeupfmvhfnnmttpfgq.supabase.co"; 
        const S_KEY = "sb_publishable_fMwMKzGhNbj9RyVhPv33sA_rqDg30C7"; 
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function abrirModal() { document.getElementById('modal-acceso').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modal-acceso').classList.add('hidden'); }

        function validarAdmin() {
            if(document.getElementById('codigo-inv').value === "DONDECOMPRO-ADMIN-2026") {
                cerrarModal();
                document.getElementById('nav-botones').innerHTML = `<button onclick="location.reload()" class="bg-red-500 text-white px-5 py-2 rounded-xl text-xs font-black uppercase">Salir</button>`;
                verVista('admin');
            } else { alert("Código incorrecto"); }
        }

        function verVista(id) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('active'));
            document.getElementById('vista-' + id).classList.add('active');
            if(id === 'admin') cargarAdmin();
        }

        // --- FUNCIONALIDADES DE BOTONES ---

        // 1. Agregar Rubro
        async function crearRubro() {
            const nombre = document.getElementById('input-nuevo-rubro').value.trim();
            if(!nombre) return alert("Escribe un nombre");
            
            const { error } = await _supabase.from('rubros').insert([{ nombre }]);
            if(error) {
                alert("El rubro ya existe o hay un error de conexión");
            } else {
                alert("Rubro '" + nombre + "' agregado con éxito");
                document.getElementById('input-nuevo-rubro').value = "";
            }
        }

        // 2. Cargar y Borrar Tiendas
        async function cargarAdmin() {
            const { data } = await _supabase.from('comercios').select('*').order('creado_at', { ascending: false });
            const tabla = document.getElementById('tabla-admin-comercios');
            tabla.innerHTML = data.map(t => `
                <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
                    <td class="py-6">
                        <div class="font-black text-slate-700 uppercase text-[11px] tracking-tight">${t.nombre_comercio}</div>
                        <div class="text-[9px] text-slate-400 font-bold italic">${new Date(t.creado_at).toLocaleDateString()}</div>
                    </td>
                    <td class="text-center">
                        <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${t.estado === 'activo' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-600'}">
                            ${t.estado}
                        </span>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-3">
                            <button onclick="aprobar('${t.id}')" class="text-emerald-500 hover:scale-125 transition-transform">✔</button>
                            <button onclick="borrar('${t.id}')" class="text-red-300 hover:text-red-600 transition-colors text-lg">🗑</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function aprobar(id) {
            await _supabase.from('comercios').update({ estado: 'activo' }).eq('id', id);
            cargarAdmin();
        }

        async function borrar(id) {
            if(confirm("¿Estás seguro de eliminar este comercio permanentemente?")) {
                await _supabase.from('comercios').delete().eq('id', id);
                cargarAdmin();
            }
        }

        // 3. Exportar Excel
        async function exportarExcel() {
            const { data } = await _supabase.from('comercios').select('nombre_comercio, rubro, whatsapp, estado, creado_at');
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Comercios");
            XLSX.writeFile(wb, "Reporte_DondeCompro_2026.xlsx");
        }
    </script>
</body>
</html>
