<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONDECOMPRO.COM | Panel Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .modal-active { display: flex !important; }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-xl italic">D</span>
                </div>
                <h1 class="text-xl font-black text-slate-900 tracking-tighter uppercase">DONDECOMPRO<span class="text-indigo-600">.COM</span></h1>
            </div>
            <div class="flex gap-4">
                <button onclick="abrirModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Acceso / Registro</button>
                <button id="btn-salir" onclick="location.reload()" class="hidden bg-rose-500 text-white px-5 py-2.5 rounded-xl font-bold text-xs uppercase transition-all">Salir del Panel</button>
            </div>
        </div>
    </nav>

    <main id="admin-panel" class="hidden max-w-7xl mx-auto p-6 md:p-10 animate-in fade-in duration-700">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <aside class="lg:col-span-4">
                <div class="glass p-8 rounded-[2rem] shadow-xl border border-white">
                    <h3 class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-6">📦 Nuevo Rubro</h3>
                    <div class="space-y-4">
                        <input type="text" id="input-nuevo-rubro" placeholder="Ej: Veterinaria" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-500 font-bold transition-all">
                        <button onclick="crearRubro()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-indigo-100">Agregar a Base de Datos</button>
                    </div>
                    <div class="mt-8">
                        <h4 class="text-[9px] font-black text-slate-400 uppercase mb-4 tracking-widest">Rubros Disponibles</h4>
                        <div id="lista-rubros" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </aside>

            <section class="lg:col-span-8">
                <div class="glass p-8 rounded-[2rem] shadow-xl border border-white min-h-[500px]">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em]">🏪 Gestión de Comercios</h3>
                        <span class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">Filtro: Todos</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="text-left text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                    <th class="pb-4">Establecimiento</th>
                                    <th class="pb-4">Estado</th>
                                    <th class="pb-4 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-comercios" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="modal-container" class="fixed inset-0 z-[60] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl scale-in-center">
            <div class="flex border-b border-slate-100">
                <button id="tab-reg" onclick="cambiarTab('registro')" class="flex-1 py-6 text-[10px] font-black uppercase tracking-widest tab-active">Registrar Local</button>
                <button id="tab-adm" onclick="cambiarTab('admin')" class="flex-1 py-6 text-[10px] font-black uppercase tracking-widest text-slate-400">Panel Admin</button>
            </div>

            <div class="p-10">
                <div id="view-registro" class="space-y-4">
                    <input type="text" id="reg-nombre" placeholder="Nombre Comercial" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 font-bold focus:ring-2 ring-indigo-100 transition-all">
                    <select id="reg-rubro" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 font-bold text-slate-500 focus:ring-2 ring-indigo-100">
                        <option value="">Cargando Rubros...</option>
                    </select>
                    <input type="text" id="reg-wa" placeholder="WhatsApp (Ej: 3876123456)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 font-bold focus:ring-2 ring-indigo-100">
                    <button onclick="registrarComercio()" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-xl shadow-emerald-100 active:scale-95 transition-all">Enviar Solicitud</button>
                </div>

                <div id="view-admin" class="hidden space-y-4">
                    <p class="text-[10px] text-center font-bold text-slate-400 uppercase mb-4">Acceso Restringido</p>
                    <input type="password" id="admin-pin" placeholder="••••" class="w-full p-6 bg-slate-50 rounded-2xl outline-none border text-center text-3xl font-black tracking-[0.5em] focus:border-indigo-500">
                    <button onclick="validarAdmin()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-2xl">Entrar al Sistema</button>
                </div>
            </div>
            <button onclick="cerrarModal()" class="w-full py-4 text-[10px] font-bold text-slate-300 uppercase hover:text-slate-500">Cerrar Ventana</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const SUPABASE_URL = "TU_URL_AQUÍ";
        const SUPABASE_KEY = "TU_ANON_KEY_AQUÍ";
        const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FUNCIONES DE INTERFAZ
        function abrirModal() {
            document.getElementById('modal-container').classList.add('modal-active');
            cargarRubrosSelector();
        }
        function cerrarModal() {
            document.getElementById('modal-container').classList.remove('modal-active');
        }
        function cambiarTab(tab) {
            const isReg = tab === 'registro';
            document.getElementById('view-registro').classList.toggle('hidden', !isReg);
            document.getElementById('view-admin').classList.toggle('hidden', isReg);
            document.getElementById('tab-reg').classList.toggle('tab-active', isReg);
            document.getElementById('tab-adm').classList.toggle('tab-active', !isReg);
            document.getElementById('tab-reg').classList.toggle('text-slate-400', !isReg);
            document.getElementById('tab-adm').classList.toggle('text-slate-400', isReg);
        }

        // LÓGICA DE DATOS
        async function cargarRubrosSelector() {
            const { data } = await _sb.from('rubros').select('nombre').order('nombre');
            const select = document.getElementById('reg-rubro');
            select.innerHTML = '<option value="">Selecciona tu Rubro...</option>' + 
                data.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join('');
        }

        async function registrarComercio() {
            const n = document.getElementById('reg-nombre').value;
            const r = document.getElementById('reg-rubro').value;
            const w = document.getElementById('reg-wa').value;

            if(!n || !r || !w) return alert("⚠️ Error: Todos los campos son obligatorios.");

            const { error } = await _sb.from('comercios').insert([{ 
                nombre_comercio: n, 
                rubro_nombre: r, 
                whatsapp: w 
            }]);

            if(error) alert("Error en el envío. Revisa tu conexión.");
            else {
                alert("✅ Solicitud enviada con éxito. El administrador activará tu local pronto.");
                cerrarModal();
                location.reload();
            }
        }

        // LÓGICA ADMINISTRATIVA
        function validarAdmin() {
            const pin = document.getElementById('admin-pin').value;
            if(pin === "2026") {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('btn-salir').classList.remove('hidden');
                cerrarModal();
                cargarAdminData();
            } else {
                alert("❌ Código incorrecto.");
            }
        }

        async function cargarAdminData() {
            const { data: coms } = await _sb.from('comercios').select('*').order('creado_at', {ascending: false});
            const { data: rubs } = await _sb.from('rubros').select('*').order('nombre');

            // Listar Rubros
            document.getElementById('lista-rubros').innerHTML = rubs.map(r => `
                <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-50 group">
                    <span class="font-bold text-slate-700 text-sm">${r.nombre}</span>
                    <button onclick="eliminarRubro('${r.id}')" class="text-rose-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all font-bold">Eliminar</button>
                </div>
            `).join('');

            // Listar Comercios
            document.getElementById('tabla-comercios').innerHTML = coms.map(c => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="py-6">
                        <div class="font-black text-slate-800 text-xs uppercase tracking-tight">${c.nombre_comercio}</div>
                        <div class="text-[10px] font-bold text-indigo-400 italic">${c.rubro_nombre || 'Sin rubro'} • ${c.whatsapp}</div>
                    </td>
                    <td>
                        <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase 
                            ${c.estado === 'activo' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                            ${c.estado}
                        </span>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            ${c.estado !== 'activo' ? `<button onclick="cambiarEstado('${c.id}', 'activo')" class="bg-indigo-600 text-white p-2 rounded-lg text-[10px] font-bold uppercase">Activar</button>` : ''}
                            <button onclick="eliminarComercio('${c.id}')" class="text-slate-300 hover:text-rose-500 font-bold p-2">🗑</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function crearRubro() {
            const n = document.getElementById('input-nuevo-rubro').value;
            if(!n) return;
            const { error } = await _sb.from('rubros').insert([{ nombre: n }]);
            if(error) alert("El rubro ya existe o hay un error de red.");
            else {
                document.getElementById('input-nuevo-rubro').value = "";
                cargarAdminData();
            }
        }

        async function cambiarEstado(id, est) {
            await _sb.from('comercios').update({ estado: est }).eq('id', id);
            cargarAdminData();
        }

        async function eliminarRubro(id) {
            if(confirm("¿Eliminar este rubro?")) {
                await _sb.from('rubros').delete().eq('id', id);
                cargarAdminData();
            }
        }

        async function eliminarComercio(id) {
            if(confirm("¿Eliminar comercio de la página?")) {
                await _sb.from('comercios').delete().eq('id', id);
                cargarAdminData();
            }
        }
    </script>
</body>
</html>
