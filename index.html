<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONDE COMPRO.COM | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .card-admin { border-radius: 2rem; background: white; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="bg-[#1a1a1a] text-white p-6 shadow-xl flex justify-between items-center">
        <h1 class="font-black tracking-tighter text-xl">DONDE COMPRO.COM</h1>
        <button onclick="location.reload()" class="bg-red-500 px-6 py-2 rounded-xl font-bold text-xs uppercase">Salir</button>
    </nav>

    <div class="max-w-6xl mx-auto p-6 mt-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="card-admin p-8 text-center border-t-4 border-indigo-500">
                <span class="text-4xl">📦</span>
                <h3 class="font-bold text-slate-800 uppercase text-xs my-4 tracking-widest">Nuevo Rubro</h3>
                <input type="text" id="in-rubro" placeholder="Ej: Veterinaria" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center font-bold outline-none border-2 border-transparent focus:border-indigo-400">
                <button onclick="crearRubro()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-[10px]">Agregar Rubro</button>
            </div>

            <div class="md:col-span-2 card-admin p-10">
                <h3 class="font-black text-slate-800 uppercase italic mb-8">Control de Tiendas</h3>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <tbody id="lista-comercios">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONEXIÓN
        const S_URL = "https://mefeupfmvhfnnmttpfgq.supabase.co";
        const S_KEY = "sb_publishable_fMwMKzGhNbj9RyVhPv33sA_rqDg30C7";
        const _supabase = supabase.createClient(S_URL, S_KEY);

        // CARGAR DATOS
        async function cargar() {
            const { data } = await _supabase.from('comercios').select('*').order('creado_at', {ascending: false});
            const lista = document.getElementById('lista-comercios');
            lista.innerHTML = data.map(c => `
                <tr class="border-b border-slate-50">
                    <td class="py-6">
                        <div class="font-black text-slate-700 text-sm uppercase">${c.nombre_comercio}</div>
                        <div class="text-[10px] text-slate-400 font-bold italic">${new Date(c.creado_at).toLocaleDateString()}</div>
                    </td>
                    <td class="text-center">
                        <span class="px-4 py-1 rounded-full text-[9px] font-black uppercase ${c.estado === 'activo' ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'}">
                            ${c.estado}
                        </span>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-4 text-xl">
                            <button onclick="activar('${c.id}')" class="text-emerald-500">✔</button>
                            <button onclick="eliminar('${c.id}')" class="text-red-300 hover:text-red-600">🗑</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function eliminar(id) {
            if(confirm("¿Eliminar este comercio permanentemente?")) {
                const { error } = await _supabase.from('comercios').delete().eq('id', id);
                if(error) alert("Error: " + error.message);
                else cargar();
            }
        }

        async function crearRubro() {
            const nombre = document.getElementById('in-rubro').value.trim();
            if(!nombre) return;
            const { error } = await _supabase.from('rubros').insert([{ nombre }]);
            if(error) alert("El rubro ya existe o hay error de red");
            else { alert("Rubro Creado"); cargar(); }
        }

        async function activar(id) {
            await _supabase.from('comercios').update({ estado: 'activo' }).eq('id', id);
            cargar();
        }

        cargar();
    </script>
</body>
</html>
