<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donde Compro.com | Rosario de la Frontera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .card-comercio:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-blue-700 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter cursor-pointer" onclick="showPage('inicio')">
                DONDE COMPRO<span class="text-yellow-400">.COM</span>
            </h1>
            <div class="flex gap-2">
                <button onclick="showPage('comerciante')" class="bg-blue-800 hover:bg-blue-900 px-3 py-1 rounded text-xs">Comercios</button>
                <button onclick="showPage('admin')" class="bg-gray-900 hover:bg-black px-3 py-1 rounded text-xs">Admin</button>
            </div>
        </div>
    </nav>

    <main id="inicio" class="page active container mx-auto p-4">
        <div class="bg-blue-600 rounded-2xl p-6 mb-6 text-white shadow-xl">
            <h2 class="text-2xl font-bold">¡Hola!</h2>
            <p class="opacity-90">¿Qué buscas hoy en Rosario de la Frontera?</p>
            <input type="text" id="searchInput" onkeyup="filtrarComercios()" placeholder="Buscar productos o tiendas..." 
                   class="w-full mt-4 p-3 rounded-lg text-gray-800 focus:ring-4 focus:ring-yellow-400 outline-none">
        </div>

        <div id="listaComercios" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </main>

    <section id="tiendaDetalle" class="page container mx-auto p-4">
        <button onclick="showPage('inicio')" class="mb-4 text-blue-600 font-bold">← Volver al listado</button>
        <div id="contenidoTienda" class="bg-white rounded-xl shadow-lg p-6">
            </div>
    </section>

    <section id="comerciante" class="page container mx-auto p-4">
        <h2 class="text-2xl font-bold mb-4">Panel de Control: Comerciante</h2>
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2">Seleccionar mi comercio:</label>
                <select id="selectComercioActivo" onchange="renderProductosComerciante()" class="w-full p-2 border rounded"></select>
            </div>
            
            <hr class="my-6">
            
            <h3 class="font-bold text-lg mb-4">Cargar Nuevo Producto</h3>
            <div class="space-y-3">
                <input type="text" id="prodNombre" placeholder="Ej: Coca Cola 1.5L" class="w-full border p-2 rounded">
                <input type="number" id="prodPrecio" placeholder="Precio $" class="w-full border p-2 rounded">
                <button onclick="agregarProducto()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700">Guardar Producto</button>
            </div>

            <div id="listaProductosComercio" class="mt-8 space-y-2">
                </div>
        </div>
    </section>

    <section id="admin" class="page container mx-auto p-4">
        <h2 class="text-2xl font-bold mb-4 italic text-red-600">Acceso Administrador</h2>
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h3 class="font-bold mb-4">Alta de Comercios Locales</h3>
            <input type="text" id="comNombre" placeholder="Nombre de la nueva tienda" class="w-full border p-2 mb-3 rounded">
            <select id="comRubro" class="w-full border p-2 mb-4 rounded">
                <option value="Gastronomía">Gastronomía 🍔</option>
                <option value="Indumentaria">Indumentaria 👕</option>
                <option value="Ferretería">Ferretería 🔧</option>
                <option value="Almacén">Almacén 🛒</option>
            </select>
            <button onclick="crearComercio()" class="w-full bg-black text-white py-3 rounded font-bold">REGISTRAR COMERCIO</button>
        </div>
    </section>

    <script>
        // --- BASE DE DATOS ---
        let db = JSON.parse(localStorage.getItem('dondeComproDB')) || {
            comercios: [],
            rubros: {
                'Gastronomía': '🍔',
                'Indumentaria': '👕',
                'Ferretería': '🔧',
                'Almacén': '🛒'
            }
        };

        function save() {
            localStorage.setItem('dondeComproDB', JSON.stringify(db));
            renderAll();
        }

        // --- NAVEGACIÓN ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        // --- LÓGICA ADMIN ---
        function crearComercio() {
            const nombre = document.getElementById('comNombre').value;
            const rubro = document.getElementById('comRubro').value;
            if(!nombre) return alert("Nombre obligatorio");

            db.comercios.push({
                id: Date.now(),
                nombre: nombre,
                rubro: rubro,
                productos: []
            });
            
            document.getElementById('comNombre').value = '';
            save();
            alert("Comercio dado de alta correctamente.");
        }

        // --- LÓGICA COMERCIANTE ---
        function agregarProducto() {
            const idCom = document.getElementById('selectComercioActivo').value;
            const nombre = document.getElementById('prodNombre').value;
            const precio = document.getElementById('prodPrecio').value;

            if(!idCom || !nombre || !precio) return alert("Completa todos los campos");

            const index = db.comercios.findIndex(c => c.id == idCom);
            db.comercios[index].productos.push({
                id: Date.now(),
                nombre: nombre,
                precio: precio
            });

            document.getElementById('prodNombre').value = '';
            document.getElementById('prodPrecio').value = '';
            save();
            renderProductosComerciante();
        }

        // --- RENDERIZADO ---
        function renderAll() {
            const lista = document.getElementById('listaComercios');
            const select = document.getElementById('selectComercioActivo');
            
            lista.innerHTML = '';
            select.innerHTML = '<option value="">-- Selecciona tu comercio --</option>';

            db.comercios.forEach(com => {
                // Render Inicio
                const icono = db.rubros[com.rubro] || '🏪';
                lista.innerHTML += `
                    <div onclick="verTienda(${com.id})" class="card-comercio bg-white p-5 rounded-xl shadow-sm border border-gray-200 cursor-pointer flex items-center gap-4">
                        <div class="text-4xl bg-gray-100 p-3 rounded-lg">${icono}</div>
                        <div>
                            <h3 class="font-bold text-lg">${com.nombre}</h3>
                            <span class="text-xs text-blue-600 font-semibold px-2 py-1 bg-blue-50 rounded-full">${com.rubro}</span>
                        </div>
                    </div>
                `;
                // Render Select Comerciante
                select.innerHTML += `<option value="${com.id}">${com.nombre}</option>`;
            });
        }

        function renderProductosComerciante() {
            const idCom = document.getElementById('selectComercioActivo').value;
            const contenedor = document.getElementById('listaProductosComercio');
            contenedor.innerHTML = '';

            const comercio = db.comercios.find(c => c.id == idCom);
            if(comercio) {
                comercio.productos.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="flex justify-between p-2 bg-gray-50 rounded border text-sm">
                            <span>${p.nombre}</span>
                            <span class="font-bold text-green-700">$${p.precio}</span>
                        </div>
                    `;
                });
            }
        }

        function verTienda(id) {
            const com = db.comercios.find(c => c.id == id);
            const icono = db.rubros[com.rubro] || '🏪';
            const contenedor = document.getElementById('contenidoTienda');
            
            let htmlProd = com.productos.length > 0 
                ? com.productos.map(p => `
                    <div class="flex justify-between items-center py-3 border-b">
                        <span class="font-medium">${p.nombre}</span>
                        <span class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full font-bold">$${p.precio}</span>
                    </div>`).join('')
                : '<p class="text-gray-400 py-4 italic">No hay productos cargados aún.</p>';

            contenedor.innerHTML = `
                <div class="text-center mb-6">
                    <div class="text-5xl mb-2">${icono}</div>
                    <h2 class="text-3xl font-black">${com.nombre}</h2>
                    <p class="text-blue-600 font-bold uppercase tracking-widest text-xs">${com.rubro}</p>
                </div>
                <h3 class="text-lg font-bold mb-4 border-b-2 border-yellow-400 inline-block">Nuestros Productos</h3>
                <div class="space-y-1">${htmlProd}</div>
            `;
            showPage('tiendaDetalle');
        }

        function filtrarComercios() {
            const busqueda = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('#listaComercios > div');
            cards.forEach(card => {
                const texto = card.innerText.toLowerCase();
                card.style.display = texto.includes(busqueda) ? 'flex' : 'none';
            });
        }

        // Inicializar
        renderAll();
    </script>
</body>
</html>
