<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO.COM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #059669; --bg: #f8fafc; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        header { 
            background: var(--primary); 
            color: white; padding: 1rem; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; 
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        /* Gestión de Paneles */
        .panel { display: none; }
        .panel.active { display: block; }

        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); }
        
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #map-admin { height: 250px; border-radius: 12px; margin-bottom: 15px; border: 2px solid #ddd; }
        .preview-img { width: 128px; height: 128px; border-radius: 10px; object-fit: cover; margin-top: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <header>
        <h2 onclick="showPanel('client-panel')" style="cursor:pointer; margin:0;">DÓNDE COMPRO<span style="color:#93c5fd">.COM</span></h2>
        <div id="auth-section">
            </div>
    </header>

    <main class="container">
        
        <div id="client-panel" class="panel active">
            <div class="card" style="text-align:center; padding: 40px 20px;">
                <h1>¿Qué estás buscando?</h1>
                <input type="text" placeholder="Escribe un producto o local..." style="max-width:500px; border-radius: 50px; padding: 15px 25px;">
                <p>Haz clic en el título para volver aquí siempre.</p>
            </div>
        </div>

        <div id="merchant-panel" class="panel">
            <div class="card">
                <h3 style="color:var(--primary)">⚙️ Mi Perfil de Comercio</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <input type="text" id="m-name" placeholder="Nombre Fantasía">
                    <select id="m-rubro-select"></select>
                    <input type="text" id="m-phone" placeholder="WhatsApp">
                    <input type="text" id="m-address" placeholder="Dirección">
                </div>
                <div id="map-admin"></div>
                <button onclick="saveProfile()" class="btn" style="background:var(--secondary); color:white; width:100%">💾 GUARDAR CAMBIOS</button>
            </div>
        </div>

    </main>

    <script>
        // --- ESTADO GLOBAL ---
        const state = {
            user: sessionStorage.getItem('user'),
            role: sessionStorage.getItem('role'),
            merchants: JSON.parse(localStorage.getItem('dc_merchants')) || {},
            rubros: JSON.parse(localStorage.getItem('dc_rubros')) || []
        };

        // --- FUNCIÓN SALIR (REPARADA) ---
        function logout() {
            console.log("Cerrando sesión...");
            sessionStorage.removeItem('user');
            sessionStorage.removeItem('role');
            sessionStorage.clear(); // Limpieza total por seguridad
            
            // Redirigir al inicio y recargar
            window.location.href = window.location.pathname; 
            window.location.reload(); 
        }

        // --- NAVEGACIÓN ENTRE PANELES ---
        function showPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        // --- RENDER DE CABECERA ---
        function updateHeader() {
            const authDiv = document.getElementById('auth-section');
            if (state.user) {
                authDiv.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:0.8rem; font-weight:bold;">${state.user}</span>
                        <button onclick="showPanel('merchant-panel')" class="btn btn-outline">Mi Panel</button>
                        <button onclick="logout()" class="btn btn-danger">Salir</button>
                    </div>
                `;
            } else {
                authDiv.innerHTML = `<button onclick="mockLogin()" class="btn btn-outline">Ingresar</button>`;
            }
        }

        // --- SIMULACRO LOGIN (Para pruebas) ---
        function mockLogin() {
            const email = prompt("Ingresa tu email de comercio:");
            if(email) {
                sessionStorage.setItem('user', email);
                sessionStorage.setItem('role', 'merchant');
                location.reload();
            }
        }

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', () => {
            updateHeader();

            // Si hay usuario, le mostramos su panel por defecto, 
            // pero el botón del título lo puede llevar de vuelta al buscador.
            if (state.user && state.role === 'merchant') {
                showPanel('merchant-panel');
                
                // Iniciar mapa solo si estamos en el panel
                setTimeout(() => {
                    const map = L.map('map-admin').setView([-25.074, -64.918], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    L.marker([-25.074, -64.918], {draggable: true}).addTo(map);
                }, 500);
            }
        });

        function saveProfile() {
            alert("¡Cambios guardados localmente!");
        }
    </script>
</body>
</html>
