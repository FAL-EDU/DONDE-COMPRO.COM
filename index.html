<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO - Rosario de la Frontera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .vista { display: none !important; }
        .vista.activa { display: block !important; }
        #mapa-registro { height: 300px; width: 100%; border-radius: 1.5rem; border: 2px solid #e2e8f0; }
        input, select { outline: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-[1001]">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl cursor-pointer tracking-tighter" onclick="verVista('cliente')">📍 DÓNDE COMPRO</h1>
            
            <div id="nav-derecha">
                <button id="btn-login-abrir" onclick="verVista('login')" class="px-4 py-2 bg-white text-indigo-700 rounded-full text-xs font-black uppercase shadow-md hover:bg-slate-100 transition">
                    Ingresar
                </button>

                <div id="menu-privado" class="hidden flex gap-2">
                    <button onclick="verVista('cliente')" class="px-3 py-1 bg-indigo-800 rounded-full text-[10px] font-bold uppercase">Inicio</button>
                    <button onclick="verVista('admin')" class="px-3 py-1 border border-indigo-300 rounded-full text-[10px] font-bold uppercase">Mi Local</button>
                    <button id="btn-super" onclick="verVista('superadmin')" class="hidden px-3 py-1 bg-slate-900 rounded-full text-[10px] font-bold text-amber-400 uppercase">Sistema</button>
                    <button onclick="location.reload()" class="px-3 py-1 bg-red-500 rounded-full text-[10px] font-bold uppercase">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        
        <div id="vista-cliente" class="vista activa">
            <div class="max-w-2xl mx-auto mb-10 mt-6 text-center">
                <h2 class="text-3xl font-black text-slate-800 mb-2 tracking-tight uppercase">Rosario de la Frontera</h2>
                <input type="text" id="buscador" onkeyup="filtrar()" placeholder="¿Qué buscas hoy?" 
                class="w-full px-8 py-5 rounded-[2.5rem] border-none shadow-2xl text-lg font-semibold focus:ring-4 focus:ring-indigo-200 transition-all">
            </div>
            <div id="lista-cliente" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="vista-login" class="vista max-w-md mx-auto mt-20">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center border-t-8 border-indigo-600">
                <div class="mb-6">
                    <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="text-3xl">🔐</span>
                    </div>
                    <h2 class="font-black text-2xl uppercase tracking-tighter">Acceso al Panel</h2>
                    <p class="text-slate-400 text-sm font-bold uppercase">Comerciantes y Admin</p>
                </div>
                <div class="space-y-4">
                    <input type="text" id="user" placeholder="Usuario" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-2 border-transparent focus:border-indigo-500 transition-all">
                    <input type="password" id="pass" placeholder="Contraseña" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-2 border-transparent focus:border-indigo-500 transition-all">
                    <button onclick="ejecutarLogin()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">
                        Entrar ahora
                    </button>
                </div>
                <p id="login-error" class="text-red-500 text-xs mt-4 font-black hidden uppercase tracking-widest">⚠️ Error de credenciales</p>
            </div>
        </div>

        <div id="vista-admin" class="vista max-w-2xl mx-auto">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-6 border-t-8 border-emerald-500">
                <h2 class="font-black text-xl mb-4 text-emerald-700 uppercase">Configuración de Mi Local</h2>
                <div id="mapa-registro" class="mb-4"></div>
                <div class="grid gap-3">
                    <input type="text" id="t-nombre" placeholder="Nombre del Comercio" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                    <select id="t-rubro" class="p-4 bg-slate-50 border rounded-2xl font-bold text-slate-500"></select>
                    <input type="text" id="t-direccion" placeholder="Dirección Física" class="p-4 bg-slate-50 border rounded-2xl">
                    <input type="text" id="t-whatsapp" placeholder="WhatsApp (Ej: 5493876123456)" class="p-4 bg-slate-50 border rounded-2xl font-bold text-emerald-600">
                    <input type="hidden" id="t-lat"><input type="hidden" id="t-lng">
                    <button onclick="guardarPerfil()" class="bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase hover:bg-emerald-700 transition">Actualizar mi información</button>
                </div>
            </div>
            
            <div id="seccion-productos" class="hidden">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-t-8 border-indigo-500 mb-8">
                    <h3 class="font-black text-lg mb-4 uppercase text-indigo-700">Nuevo Producto</h3>
                    <div class="grid gap-3">
                        <input type="text" id="p-nombre" placeholder="¿Qué vendes?" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="number" id="p-precio" placeholder="Precio $" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="text" id="p-img" placeholder="URL Imagen del producto" class="p-4 bg-slate-50 border rounded-2xl text-xs">
                        <button onclick="publicar()" class="bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-indigo-700">Subir Producto</button>
                    </div>
                </div>
                <div id="lista-admin" class="grid gap-2 pb-20"></div>
            </div>
        </div>

        <div id="vista-superadmin" class="vista max-w-4xl mx-auto">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border-t-8 border-slate-900">
                <h2 class="font-black text-2xl mb-6 uppercase tracking-tighter">Control de Comercios</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-400 uppercase text-[10px] border-b">
                            <tr><th class="p-4">Comercio</th><th class="p-4">Rubro</th><th class="p-4">Estado</th><th class="p-4 text-right">Acciones</th></tr>
                        </thead>
                        <tbody id="tabla-tiendas-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const S_URL = 'https://mefeupfmvhfnnmttpfgq.supabase.co';
        const S_KEY = 'sb_publishable_fMwMKzGhNbj9RyVhPv33sA_rqDg30C7';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        let productos = [];
        let mapa, marcador;

        // --- SISTEMA DE NAVEGACIÓN ---
        function verVista(v) {
            document.querySelectorAll('.vista').forEach(el => el.classList.remove('activa'));
            const vistaDestino = document.getElementById('vista-' + v);
            if(vistaDestino) vistaDestino.classList.add('activa');

            if(v === 'cliente') cargarProductosCliente();
            if(v === 'admin') { 
                setTimeout(initMapa, 300); 
                cargarPerfilInputs(); 
                cargarRubrosSelect(); 
            }
            if(v === 'superadmin') cargarTiendasAdmin();
            window.scrollTo(0,0);
        }

        // --- LOGIN CORREGIDO ---
        function ejecutarLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const errorMsg = document.getElementById('login-error');

            // Login Admin Principal
            if(u === 'admin' && p === '123 admin') {
                document.getElementById('btn-login-abrir').classList.add('hidden');
                document.getElementById('menu-privado').classList.remove('hidden');
                document.getElementById('btn-super').classList.remove('hidden'); // Mostrar botón sistema
                verVista('admin');
            } 
            // Aquí podrías agregar "else if" para otros comerciantes admitidos
            else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        }

        // --- MAPA ---
        function initMapa() {
            if (mapa) return;
            mapa = L.map('mapa-registro').setView([-25.795, -64.966], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            marcador = L.marker([-25.795, -64.966], {draggable: true}).addTo(mapa);
            marcador.on('dragend', function() {
                const pos = marcador.getLatLng();
                document.getElementById('t-lat').value = pos.lat;
                document.getElementById('t-lng').value = pos.lng;
            });
        }

        // --- LÓGICA DE DATOS ---
        async function cargarRubrosSelect() {
            const { data } = await _supabase.from('rubros').select('*').order('nombre');
            const select = document.getElementById('t-rubro');
            if(select && data) {
                select.innerHTML = '<option value="">Seleccionar Rubro...</option>' + 
                    data.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join('');
            }
        }

        async function guardarPerfil() {
            const payload = {
                nombre_comercio: document.getElementById('t-nombre').value,
                rubro: document.getElementById('t-rubro').value,
                direccion: document.getElementById('t-direccion').value,
                whatsapp: document.getElementById('t-whatsapp').value,
                latitud: parseFloat(document.getElementById('t-lat').value) || -25.795,
                longitud: parseFloat(document.getElementById('t-lng').value) || -64.966
            };
            const { data: existente } = await _supabase.from('comercios').select('id').limit(1).maybeSingle();
            
            let resultado;
            if (existente) resultado = await _supabase.from('comercios').update(payload).eq('id', existente.id);
            else resultado = await _supabase.from('comercios').insert([payload]);
            
            if(!resultado.error) {
                alert("Perfil actualizado. Un administrador revisará los datos.");
                cargarPerfilInputs();
            }
        }

        async function cargarPerfilInputs() {
            const { data } = await _supabase.from('comercios').select('*').limit(1).maybeSingle();
            if(data) {
                document.getElementById('t-nombre').value = data.nombre_comercio || '';
                document.getElementById('t-rubro').value = data.rubro || '';
                document.getElementById('t-direccion').value = data.direccion || '';
                document.getElementById('t-whatsapp').value = data.whatsapp || '';
                document.getElementById('seccion-productos').classList.remove('hidden');
                cargarProductosAdmin(data.id);
            }
        }

        async function publicar() {
            const { data: tienda } = await _supabase.from('comercios').select('id').limit(1).maybeSingle();
            if(!tienda) return alert("Completa el perfil del comercio primero.");

            const prod = {
                nombre_producto: document.getElementById('p-nombre').value,
                precio: parseFloat(document.getElementById('p-precio').value),
                imagen_url: document.getElementById('p-img').value || 'https://via.placeholder.com/400',
                tienda_id: tienda.id
            };
            await _supabase.from('productos').insert([prod]);
            document.getElementById('p-nombre').value = '';
            document.getElementById('p-precio').value = '';
            cargarProductosAdmin(tienda.id);
        }

        async function cargarProductosAdmin(id) {
            const { data } = await _supabase.from('productos').select('*').eq('tienda_id', id);
            document.getElementById('lista-admin').innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border">
                    <span class="font-black text-xs uppercase">${p.nombre_producto} - $${p.precio}</span>
                    <button onclick="borrarProd('${p.id}', '${id}')" class="text-red-500 font-black text-[10px] px-4 py-2 hover:bg-red-50 rounded-xl transition">Eliminar</button>
                </div>
            `).join('');
        }

        async function borrarProd(id, tId) {
            if(confirm("¿Eliminar producto?")) {
                await _supabase.from('productos').delete().eq('id', id);
                cargarProductosAdmin(tId);
            }
        }

        // --- SUPER ADMIN ---
        async function cargarTiendasAdmin() {
            const { data } = await _supabase.from('comercios').select('*').order('creado_at', {ascending: false});
            document.getElementById('tabla-tiendas-body').innerHTML = data.map(t => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-4 font-black">${t.nombre_comercio}</td>
                    <td class="p-4 text-xs font-bold text-slate-500 uppercase">${t.rubro}</td>
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${t.estado==='activo'?'bg-emerald-100 text-emerald-600':'bg-amber-100 text-amber-600'}">
                            ${t.estado || 'pendiente'}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="cambiarEstadoTienda('${t.id}', 'activo')" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[9px] font-bold uppercase shadow-sm">Activar</button>
                    </td>
                </tr>
            `).join('');
        }

        async function cambiarEstadoTienda(id, nuevoEstado) {
            await _supabase.from('comercios').update({ estado: nuevoEstado }).eq('id', id);
            cargarTiendasAdmin();
        }

        // --- CLIENTE ---
        async function cargarProductosCliente() {
            const { data } = await _supabase.from('productos').select('*, comercios(*)');
            productos = (data || []).filter(p => p.comercios?.estado === 'activo');
            renderCliente();
        }

        function renderCliente(lista = productos) {
            document.getElementById('lista-cliente').innerHTML = lista.map(p => `
                <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100 flex flex-col hover:scale-[1.02] transition-transform duration-300">
                    <div class="relative">
                        <img src="${p.imagen_url}" class="w-full h-48 object-cover">
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full shadow-sm">
                            <span class="text-[9px] font-black text-indigo-700 uppercase">${p.comercios?.rubro}</span>
                        </div>
                    </div>
                    <div class="p-6 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="font-black text-lg uppercase leading-tight text-slate-800">${p.nombre_producto}</h3>
                            <p class="text-emerald-600 font-black text-2xl mt-1">$${p.precio}</p>
                            <p class="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-tighter">🏪 ${p.comercios?.nombre_comercio}</p>
                        </div>
                        <a href="https://wa.me/${p.comercios?.whatsapp}" target="_blank" class="block mt-6 text-center bg-emerald-500 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg hover:bg-emerald-600 transition">Consultar WhatsApp</a>
                    </div>
                </div>
            `).join('');
        }

        function filtrar() {
            const t = document.getElementById('buscador').value.toLowerCase();
            renderCliente(productos.filter(p => 
                p.nombre_producto.toLowerCase().includes(t) || 
                p.comercios?.nombre_comercio.toLowerCase().includes(t)
            ));
        }

        window.onload = () => verVista('cliente');
    </script>
</body>
</html>
