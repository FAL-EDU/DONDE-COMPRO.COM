<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO - Panel Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .vista { display: none; }
        .vista.active { display: block; }
    </style>
</head>
<body>

    <nav class="bg-indigo-600 p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-white font-black text-xl tracking-tighter">📍 DÓNDE COMPRO</h1>
            <div id="nav-botones" class="flex gap-2">
                <button onclick="verVista('vista-login')" class="px-4 py-2 bg-white rounded-full text-[10px] font-bold uppercase">Entrar</button>
            </div>
        </div>
    </nav>

    <div id="vista-login" class="vista active max-w-md mx-auto mt-20 p-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center border-t-8 border-indigo-600">
            <div class="mb-8">
                <h2 class="font-black text-2xl uppercase tracking-tighter">Acceso al Panel</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase mt-2">Prueba con: admin / admin123</p>
            </div>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-black uppercase ml-2 text-slate-400">Usuario</label>
                    <input type="text" id="acceso-usuario" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-2 border-slate-100 outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase ml-2 text-slate-400">Contraseña</label>
                    <input type="password" id="acceso-password" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-2 border-slate-100 outline-none focus:border-indigo-500">
                </div>
                <button onclick="verificarEntrada()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 transition active:scale-95 mt-4">
                    ENTRAR AHORA
                </button>
            </div>
            <p id="error-login" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden">⚠️ Error de Credenciales</p>
        </div>
    </div>

    <div id="vista-perfil" class="vista max-w-4xl mx-auto mt-10 p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-md">
                <h3 class="font-black uppercase mb-6 text-indigo-600">Configuración del Local</h3>
                <div class="space-y-4">
                    <input type="text" id="t-nombre" placeholder="Nombre del Comercio" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 font-bold">
                    <select id="t-rubro" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 font-bold"></select>
                    <input type="text" id="t-whatsapp" placeholder="WhatsApp (ej: 5493876...)" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 font-bold">
                    <div class="flex gap-2">
                        <input type="text" id="t-lat" placeholder="Latitud" class="w-1/2 p-3 bg-slate-50 rounded-xl border border-slate-200 text-xs">
                        <input type="text" id="t-lng" placeholder="Longitud" class="w-1/2 p-3 bg-slate-50 rounded-xl border border-slate-200 text-xs">
                    </div>
                    <button onclick="guardarInfo()" class="w-full bg-green-500 text-white py-4 rounded-xl font-black uppercase text-sm">Guardar Perfil</button>
                </div>
            </div>

            <div id="seccion-prods" class="bg-indigo-50 p-8 rounded-[2rem] shadow-inner">
                <h3 class="font-black uppercase mb-6 text-indigo-900">Publicar Producto</h3>
                <div class="space-y-4">
                    <input type="text" id="p-nombre" placeholder="Ej: Pañales Huggies" class="w-full p-3 bg-white rounded-xl border border-indigo-100 font-bold">
                    <input type="number" id="p-precio" placeholder="Precio ($)" class="w-full p-3 bg-white rounded-xl border border-indigo-100 font-bold">
                    <input type="text" id="p-img" placeholder="URL de imagen (opcional)" class="w-full p-3 bg-white rounded-xl border border-indigo-100 text-xs">
                    <button onclick="subirProducto()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black uppercase text-sm">Publicar Ahora</button>
                </div>
            </div>
        </div>
    </div>

    <div id="vista-admin" class="vista max-w-5xl mx-auto mt-10 p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-2xl uppercase italic text-slate-800">Control de Tiendas</h2>
                <button class="bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold text-xs uppercase">Excel</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="border-b-2 border-slate-100">
                        <tr class="text-[10px] text-slate-400 font-black uppercase">
                            <th class="pb-4">Tienda</th>
                            <th class="pb-4">Estado</th>
                            <th class="pb-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-tiendas-admin" class="text-sm font-bold">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN SUPABASE ---
        const S_URL = "TU_URL_DE_SUPABASE";
        const S_KEY = "TU_ANON_KEY";
        const _supabase = supabase.createClient(S_URL, S_KEY);

        // --- NAVEGACIÓN ---
        function verVista(id) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'vista-admin') cargarTiendasAdmin();
            if(id === 'vista-perfil') cargarRubros();
        }

        // --- LOGIN INFALIBLE ---
        function verificarEntrada() {
            const u = document.getElementById('acceso-usuario').value.trim();
            const p = document.getElementById('acceso-password').value.trim();
            const msgError = document.getElementById('error-login');

            if (u === "admin" && p === "admin123") {
                document.getElementById('nav-botones').innerHTML = `
                    <button onclick="verVista('vista-perfil')" class="px-4 py-2 border border-white/30 rounded-full text-[10px] font-bold uppercase text-white">Mi Local</button>
                    <button onclick="verVista('vista-admin')" class="px-4 py-2 bg-amber-400 rounded-full text-[10px] font-bold uppercase text-slate-900">Admin</button>
                    <button onclick="location.reload()" class="px-4 py-2 bg-red-500 rounded-full text-[10px] font-bold uppercase text-white">Salir</button>
                `;
                verVista('vista-perfil');
            } else {
                msgError.classList.remove('hidden');
                setTimeout(() => msgError.classList.add('hidden'), 3000);
            }
        }

        // --- LÓGICA DE DATOS ---
        async function cargarRubros() {
            const { data } = await _supabase.from('rubros').select('*');
            const select = document.getElementById('t-rubro');
            if(data) {
                select.innerHTML = data.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join('');
            }
        }

        async function guardarInfo() {
            const payload = {
                nombre_comercio: document.getElementById('t-nombre').value,
                rubro: document.getElementById('t-rubro').value,
                whatsapp: document.getElementById('t-whatsapp').value,
                latitud: parseFloat(document.getElementById('t-lat').value) || 0,
                longitud: parseFloat(document.getElementById('t-lng').value) || 0,
                estado: 'pendiente'
            };

            const { data: existente } = await _supabase.from('comercios').select('id').limit(1).maybeSingle();
            
            let res;
            if(existente) {
                res = await _supabase.from('comercios').update(payload).eq('id', existente.id);
            } else {
                res = await _supabase.from('comercios').insert([payload]);
            }

            if(res.error) alert("Error: " + res.error.message);
            else alert("✅ Local Guardado Correctamente");
        }

        async function subirProducto() {
            const { data: tienda } = await _supabase.from('comercios').select('id').limit(1).maybeSingle();
            if(!tienda) return alert("Primero guarda el perfil del local.");

            const prod = {
                nombre_producto: document.getElementById('p-nombre').value,
                precio: parseFloat(document.getElementById('p-precio').value),
                imagen_url: document.getElementById('p-img').value || "https://via.placeholder.com/150",
                tienda_id: tienda.id
            };

            const { error } = await _supabase.from('productos').insert([prod]);
            if(error) alert("Error al subir: " + error.message);
            else {
                alert("🚀 Producto publicado");
                document.getElementById('p-nombre').value = "";
                document.getElementById('p-precio').value = "";
            }
        }

        async function cargarTiendasAdmin() {
            const { data } = await _supabase.from('comercios').select('*').order('creado_at', { ascending: false });
            const lista = document.getElementById('lista-tiendas-admin');
            if(data) {
                lista.innerHTML = data.map(t => `
                    <tr class="border-b border-slate-50">
                        <td class="py-4 uppercase">${t.nombre_comercio}</td>
                        <td><span class="px-2 py-1 ${t.estado === 'activo' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'} rounded text-[9px] uppercase">${t.estado}</span></td>
                        <td class="text-right flex gap-2 justify-end py-4">
                            <button onclick="cambiarEstado('${t.id}', 'activo')" class="bg-slate-100 p-2 rounded text-green-600">✔</button>
                            <button onclick="borrarTienda('${t.id}')" class="bg-slate-100 p-2 rounded text-red-400">🗑</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function cambiarEstado(id, nuevo) {
            await _supabase.from('comercios').update({ estado: nuevo }).eq('id', id);
            cargarTiendasAdmin();
        }

        async function borrarTienda(id) {
            if(confirm("¿Seguro que deseas eliminar esta tienda?")) {
                await _supabase.from('comercios').delete().eq('id', id);
                cargarTiendasAdmin();
            }
        }
    </script>
</body>
</html>
