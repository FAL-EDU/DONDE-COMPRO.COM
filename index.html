<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONDE COMPRO.COM | Rosario de la Frontera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f3f7f6; }
        .vista { display: none; }
        .vista.active { display: block; }
        .card-custom { border-radius: 2.5rem; transition: all 0.3s ease; }
    </style>
</head>
<body>

    <nav class="bg-[#1a1a1a] text-white p-4 sticky top-0 z-[1000] shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tighter cursor-pointer" onclick="location.reload()">DONDE COMPRO.COM</h1>
            <button onclick="abrirModal()" class="bg-teal-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Acceso / Registro</button>
        </div>
    </nav>

    <div id="vista-home" class="vista active">
        <header class="bg-[#0d9488] p-16 text-center text-white">
            <h2 class="text-4xl font-extrabold mb-6 uppercase italic tracking-tighter">¿Qué necesitás comprar?</h2>
            <div class="max-w-xl mx-auto bg-white p-2 rounded-[2rem] shadow-2xl flex">
                <input type="text" placeholder="Ej: Pan, Clavos..." class="flex-1 p-4 text-slate-700 outline-none rounded-2xl font-bold">
                <button class="bg-[#1a1a1a] text-white px-8 py-4 rounded-2xl font-black uppercase text-xs">Buscar</button>
            </div>
        </header>
        <div class="py-20 text-center opacity-20">
            <img src="https://cdn-icons-png.flaticon.com/512/3081/3081840.png" class="w-32 mx-auto mb-4">
            <p class="font-bold uppercase tracking-widest text-xs">Busca por rubro o producto</p>
        </div>
    </div>

    <div id="vista-admin" class="vista max-w-6xl mx-auto p-6 mt-10">
        <div class="flex flex-col md:flex-row gap-8">
            <div class="md:w-1/3">
                <div class="bg-white p-8 card-custom shadow-lg text-center border-2 border-slate-50">
                    <h3 class="font-black text-slate-800 uppercase text-[10px] mb-4">📦 Nuevo Rubro</h3>
                    <input type="text" id="in-nuevo-rubro" placeholder="Nombre rubro" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center font-bold outline-none">
                    <button onclick="crearRubro()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-[10px]">Guardar Rubro</button>
                </div>
            </div>
            <div class="md:w-2/3 bg-white p-10 card-custom shadow-2xl">
                <h3 class="font-black text-slate-800 uppercase italic mb-8">Gestión de Tiendas</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <tbody id="tabla-admin-comercios"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-acceso" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-10 shadow-2xl relative">
            <button onclick="cerrarModal()" class="absolute top-8 right-8 text-slate-300 text-3xl">&times;</button>
            
            <div class="flex border-b mb-8 text-[10px] font-black uppercase">
                <button onclick="cambiarTab('registro')" id="t-reg" class="flex-1 pb-4 border-b-2 border-teal-500 text-teal-600">Registrar Local</button>
                <button onclick="cambiarTab('admin')" id="t-adm" class="flex-1 pb-4 border-b-2 border-transparent">Admin</button>
            </div>

            <div id="f-registro" class="space-y-4">
                <input type="text" id="reg-nombre" placeholder="Nombre del Comercio" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                <select id="reg-rubro" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                    </select>
                <input type="text" id="reg-whatsapp" placeholder="WhatsApp" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                <button onclick="registrarComercio()" class="w-full bg-teal-600 text-white py-5 rounded-2xl font-black uppercase">Enviar Solicitud</button>
            </div>

            <div id="f-admin" class="hidden space-y-4">
                <input type="password" id="cod-admin" placeholder="Código Admin" class="w-full p-5 bg-slate-50 rounded-2xl font-bold text-center">
                <button onclick="entrarAdmin()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase">Acceder</button>
            </div>
        </div>
    </div>

    <script>
        const S_URL = "https://mefeupfmvhfnnmttpfgq.supabase.co";
        const S_KEY = "sb_publishable_fMwMKzGhNbj9RyVhPv33sA_rqDg30C7";
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function abrirModal() { 
            document.getElementById('modal-acceso').classList.remove('hidden'); 
            cargarRubrosEnSelect(); 
        }
        function cerrarModal() { document.getElementById('modal-acceso').classList.add('hidden'); }
        
        function cambiarTab(tab) {
            document.getElementById('f-registro').classList.toggle('hidden', tab === 'admin');
            document.getElementById('f-admin').classList.toggle('hidden', tab === 'registro');
            document.getElementById('t-reg').className = tab === 'registro' ? 'flex-1 pb-4 border-b-2 border-teal-500 text-teal-600' : 'flex-1 pb-4 border-b-2 border-transparent text-slate-400';
            document.getElementById('t-adm').className = tab === 'admin' ? 'flex-1 pb-4 border-b-2 border-teal-500 text-teal-600' : 'flex-1 pb-4 border-b-2 border-transparent text-slate-400';
        }

        async function cargarRubrosEnSelect() {
            const { data } = await _supabase.from('rubros').select('nombre');
            const select = document.getElementById('reg-rubro');
            select.innerHTML = '<option value="">Seleccionar Rubro...</option>';
            data?.forEach(r => select.innerHTML += `<option value="${r.nombre}">${r.nombre}</option>`);
        }

        async function registrarComercio() {
            const nom = document.getElementById('reg-nombre').value;
            const rub = document.getElementById('reg-rubro').value;
            const wha = document.getElementById('reg-whatsapp').value;
            if(!nom || !rub || !wha) return alert("Faltan datos");
            
            const { error } = await _supabase.from('comercios').insert([{ nombre_comercio: nom, rubro: rub, whatsapp: wha }]);
            if(error) alert("Error: " + error.message);
            else { alert("¡Solicitud enviada!"); cerrarModal(); }
        }

        async function crearRubro() {
            const n = document.getElementById('in-nuevo-rubro').value;
            const { error } = await _supabase.from('rubros').insert([{ nombre: n }]);
            if(error) alert("Este rubro ya existe en la base de datos."); // Punto 3 solucionado
            else { alert("Agregado"); location.reload(); }
        }

        function entrarAdmin() {
            if(document.getElementById('cod-admin').value === "DONDECOMPRO-ADMIN-2026") {
                cerrarModal();
                document.getElementById('vista-home').classList.remove('active');
                document.getElementById('vista-admin').classList.add('active');
                cargarAdmin();
            }
        }

        async function cargarAdmin() {
            const { data } = await _supabase.from('comercios').select('*').order('creado_at', {ascending: false});
            const t = document.getElementById('tabla-admin-comercios');
            t.innerHTML = data.map(c => `
                <tr class="border-b">
                    <td class="py-4 font-bold uppercase text-xs">${c.nombre_comercio}<br><span class="text-[9px] text-slate-400">${c.rubro}</span></td>
                    <td class="text-right">
                        <button onclick="borrar('${c.id}')" class="text-red-300 hover:text-red-600">🗑</button>
                    </td>
                </tr>
            `).join('');
        }

        async function borrar(id) {
            if(confirm("¿Eliminar?")) {
                await _supabase.from('comercios').delete().eq('id', id);
                cargarAdmin();
            }
        }
    </script>
</body>
</html>
