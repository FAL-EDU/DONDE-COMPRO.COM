<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO.COM - Gestión Total</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #059669; --bg: #f8fafc; --text: #1e293b; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        header { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-outline { background: white; border: 1px solid #ddd; }
        
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .panel { display: none; }
        .panel.active { display: block; }
        
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        /* Listas Admin */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; }
        .item-row:last-child { border-bottom: none; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .status-suspended { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <header>
        <h2 onclick="location.reload()" style="cursor:pointer; margin:0;">DÓNDE COMPRO.COM</h2>
        <div id="nav-auth">
            <button onclick="openLogin('admin')" class="btn btn-outline" id="btn-admin-login">🛡️ Admin</button>
            <button onclick="openLogin('merchant')" class="btn btn-outline" id="btn-merch-login">🏪 Comercio</button>
            <div id="user-info" style="display:none; align-items:center; gap:10px;">
                <span id="user-email" style="font-weight:700;"></span>
                <button onclick="logout()" class="btn btn-danger btn-small">Salir</button>
            </div>
        </div>
    </header>

    <main class="container">
        
        <div id="merchant-panel" class="panel">
            <div class="card">
                <h2>⚙️ Configuración de mi Comercio</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label>Nombre Fantasía</label>
                        <input type="text" id="m-name" placeholder="Ej: Panadería El Sol">
                    </div>
                    <div>
                        <label>Rubro</label>
                        <select id="m-rubro-select"></select>
                    </div>
                    <input type="text" id="m-address" placeholder="Dirección">
                    <input type="text" id="m-phone" placeholder="WhatsApp (ej: 3876123456)">
                    <input type="text" id="m-hours" placeholder="Horario comercial">
                    <div>
                        <label>Atención fuera de horario</label>
                        <select id="m-extra">
                            <option value="NO">NO</option>
                            <option value="SI">SI</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top:15px;">
                    <label>Logo (Subir para cambiar)</label>
                    <input type="file" id="m-logo-file" accept="image/*" onchange="previewMerchantLogo(event)">
                    <div id="m-logo-preview" style="margin-top:10px;"></div>
                </div>
                <button onclick="saveMerchantProfile()" class="btn btn-secondary" style="width:100%; margin-top:20px;">
                    💾 GUARDAR CAMBIOS
                </button>
            </div>
        </div>

        <div id="admin-panel" class="panel">
            <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap: 20px;">
                <div class="card">
                    <h3>📦 Rubros / Categorías</h3>
                    <input type="text" id="new-rubro-name" placeholder="Nombre del rubro...">
                    <input type="file" id="new-rubro-img" accept="image/*">
                    <button onclick="addRubro()" class="btn btn-primary" style="width:100%;">Añadir Rubro</button>
                    
                    <div id="rubros-list" style="margin-top:20px; border:1px solid #eee; border-radius:10px;"></div>
                </div>

                <div class="card">
                    <h3>🏪 Gestión de Comercios</h3>
                    <p style="font-size:0.8rem; color:#666;">Control de altas, bajas y suspensiones</p>
                    <div id="admin-merchants-list" style="border:1px solid #eee; border-radius:10px; overflow:hidden;"></div>
                </div>
            </div>
        </div>

    </main>

    <div id="login-modal" class="panel" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; display:none; justify-content:center; align-items:center;">
        <div class="card" style="width:320px;">
            <h3 id="login-title">Ingreso</h3>
            <input type="email" id="login-email" placeholder="Tu email...">
            <button onclick="processLogin()" class="btn btn-primary" style="width:100%;">Entrar</button>
            <button onclick="document.getElementById('login-modal').style.display='none'" class="btn btn-outline" style="width:100%; margin-top:5px;">Cancelar</button>
        </div>
    </div>

    <script>
        const state = {
            user: sessionStorage.getItem('user'),
            role: sessionStorage.getItem('role'),
            merchants: JSON.parse(localStorage.getItem('dc_merchants')) || {},
            rubros: JSON.parse(localStorage.getItem('dc_rubros')) || [],
            tempLogo: null
        };

        // --- 1) FUNCIONALIDAD COMERCIANTE: GUARDAR CAMBIOS ---
        async function previewMerchantLogo(e) {
            const file = e.target.files[0];
            if(file) state.tempLogo = await toBase64(file, 128);
            document.getElementById('m-logo-preview').innerHTML = `<img src="${state.tempLogo}" style="width:60px; border-radius:50%">`;
        }

        function saveMerchantProfile() {
            const m = state.merchants[state.user];
            if(!m) return;

            m.name = document.getElementById('m-name').value;
            m.rubro = document.getElementById('m-rubro-select').value;
            m.address = document.getElementById('m-address').value;
            m.phone = document.getElementById('m-phone').value;
            m.hours = document.getElementById('m-hours').value;
            m.extraHours = document.getElementById('m-extra').value;
            
            if(state.tempLogo) m.logo = state.tempLogo;

            localStorage.setItem('dc_merchants', JSON.stringify(state.merchants));
            alert("¡Cambios guardados con éxito!");
            state.tempLogo = null;
        }

        // --- 2) FUNCIONALIDAD ADMIN: RUBROS (CREAR/ELIMINAR) ---
        async function addRubro() {
            const name = document.getElementById('new-rubro-name').value;
            const file = document.getElementById('new-rubro-img').files[0];
            if(!name) return alert("Ingresa un nombre");

            let img = '';
            if(file) img = await toBase64(file, 100);

            state.rubros.push({ name, img });
            updateStorage();
            renderAdmin();
            document.getElementById('new-rubro-name').value = '';
        }

        function deleteRubro(index) {
            if(confirm("¿Eliminar este rubro?")) {
                state.rubros.splice(index, 1);
                updateStorage();
                renderAdmin();
            }
        }

        // --- 3) FUNCIONALIDAD ADMIN: COMERCIOS (ALTA/BAJA/SUSPENDER) ---
        function setMerchantStatus(email, newStatus) {
            if(newStatus === 'deleted') {
                if(confirm(`¿Estás seguro de ELIMINAR permanentemente a ${email}?`)) {
                    delete state.merchants[email];
                } else return;
            } else {
                state.merchants[email].status = newStatus;
            }
            updateStorage();
            renderAdmin();
        }

        // --- CORE RENDER ---
        function renderAdmin() {
            // Lista Rubros
            const rList = document.getElementById('rubros-list');
            rList.innerHTML = state.rubros.map((r, i) => `
                <div class="item-row">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${r.img || ''}" style="width:30px; height:30px; border-radius:50%; background:#eee;">
                        <span>${r.name}</span>
                    </div>
                    <button onclick="deleteRubro(${i})" class="btn btn-danger" style="padding:5px;">🗑️</button>
                </div>
            `).join('');

            // Lista Comercios
            const mList = document.getElementById('admin-merchants-list');
            mList.innerHTML = Object.keys(state.merchants).map(email => {
                const m = state.merchants[email];
                const statusClass = `status-${m.status}`;
                return `
                    <div class="item-row" style="flex-direction:column; align-items:flex-start; gap:10px;">
                        <div style="width:100%; display:flex; justify-content:space-between;">
                            <strong>${m.name || email}</strong>
                            <span class="status-pill ${statusClass}">${m.status}</span>
                        </div>
                        <div style="display:flex; gap:5px; width:100%;">
                            <button onclick="setMerchantStatus('${email}', 'active')" class="btn btn-secondary" style="flex:1; font-size:0.7rem;">ALTA</button>
                            <button onclick="setMerchantStatus('${email}', 'suspended')" class="btn btn-warning" style="flex:1; font-size:0.7rem;">SUSPENDER</button>
                            <button onclick="setMerchantStatus('${email}', 'deleted')" class="btn btn-danger" style="flex:1; font-size:0.7rem;">BAJA</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function loadMerchantPanel() {
            const m = state.merchants[state.user];
            if(!m) return;
            document.getElementById('m-name').value = m.name || '';
            document.getElementById('m-address').value = m.address || '';
            document.getElementById('m-phone').value = m.phone || '';
            document.getElementById('m-hours').value = m.hours || '';
            document.getElementById('m-extra').value = m.extraHours || 'NO';
            if(m.logo) document.getElementById('m-logo-preview').innerHTML = `<img src="${m.logo}" style="width:60px; border-radius:50%">`;
            
            // Actualizar selector de rubros con los rubros actuales del admin
            const sel = document.getElementById('m-rubro-select');
            sel.innerHTML = state.rubros.map(r => `<option value="${r.name}" ${m.rubro === r.name ? 'selected' : ''}>${r.name}</option>`).join('');
        }

        // --- SISTEMA ---
        function openLogin(role) {
            state.pendingRole = role;
            document.getElementById('login-modal').style.display = 'flex';
        }

        function processLogin() {
            const email = document.getElementById('login-email').value.toLowerCase();
            if(!email) return;
            sessionStorage.setItem('user', email);
            sessionStorage.setItem('role', state.pendingRole);
            if(state.pendingRole === 'merchant' && !state.merchants[email]) {
                state.merchants[email] = { status: 'pending', name: '', rubro: '', logo: '' };
                updateStorage();
            }
            location.reload();
        }

        function checkSession() {
            if(state.user) {
                document.getElementById('btn-admin-login').style.display = 'none';
                document.getElementById('btn-merch-login').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-email').innerText = state.user;
                if(state.role === 'admin') { 
                    document.getElementById('admin-panel').classList.add('active'); 
                    renderAdmin(); 
                } else { 
                    document.getElementById('merchant-panel').classList.add('active'); 
                    loadMerchantPanel(); 
                }
            }
        }

        function updateStorage() {
            localStorage.setItem('dc_rubros', JSON.stringify(state.rubros));
            localStorage.setItem('dc_merchants', JSON.stringify(state.merchants));
        }

        function toBase64(file, size) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = size; canvas.height = size;
                        ctx.drawImage(img, 0, 0, size, size);
                        resolve(canvas.toDataURL('image/webp'));
                    };
                };
                reader.readAsDataURL(file);
            });
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        document.addEventListener('DOMContentLoaded', checkSession);
    </script>
</body>
</html>
