<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>donde compro.com - Offline</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #28a745; --dark: #343a40; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--light); }
        
        /* 1) Buscador Simplificado */
        .search-container { background: white; padding: 20px; display: flex; gap: 10px; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type="text"] { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 60%; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Tarjeta de Producto */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 15px; }
        .store-tag { background: #e9ecef; color: #6c757d; padding: 4px 8px; border-radius: 5px; font-size: 0.85em; }
        .price { color: var(--primary); font-size: 1.5em; font-weight: bold; margin: 10px 0; }
        
        /* Botones de Acción */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-pedir { background: var(--primary); color: white; grid-column: span 2; }
        .btn-ruta { background: var(--dark); color: white; }
        .btn-tienda { background: #6c757d; color: white; }

        /* Mapa y Ruta */
        #map-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; }
        #map { height: 70%; width: 100%; }
        .route-controls { padding: 20px; background: white; height: 30%; border-top: 2px solid #ddd; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="main-search" placeholder="¿Qué estás buscando? (Ej: Farmacia, Panales)">
        <button class="btn-search" onclick="filtrarProductos()">🔍 BUSCAR</button>
    </div>

    <div class="product-grid" id="product-list">
        <div class="product-card" data-store="FARMACIA TU FARMA">
            <img src="https://via.placeholder.com/400x300?text=Pañales+Huggies" class="product-img">
            <div class="product-info">
                <h3>Pañales Huggies</h3>
                <span class="store-tag">De: FARMACIA TU FARMA</span>
                <p class="price">$25000</p>
                <p>📍 GÜEMES 302 - ROSARIO DE LA FRONTERA</p>
                
                <div class="actions">
                    <button class="btn btn-pedir">💬 PEDIR</button>
                    <button class="btn btn-tienda" onclick="verTienda('FARMACIA TU FARMA')">🏪 TIENDA</button>
                    <button class="btn btn-ruta" onclick="abrirMapa('GÜEMES 302')">📍 RUTA</button>
                </div>
            </div>
        </div>
    </div>

    <div id="map-modal">
        <div id="map"></div>
        <div class="route-controls">
            <h4>Trazar Ruta</h4>
            <p>Ingresa dirección manual si el GPS no es exacto:</p>
            <input type="text" id="manual-address" placeholder="Ej: Belgrano 180" style="width: 70%; padding: 8px;">
            <button class="btn-search" onclick="trazarRutaManual()">TRAZAR</button>
            <button onclick="cerrarMapa()" style="margin-top: 10px; display: block; background: none; border: none; color: red; cursor: pointer;">✕ Cerrar Mapa</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let destinoActual = "";

        // Función para filtrar por tienda (Botón Ver Tienda)
        function verTienda(nombreTienda) {
            const productos = document.querySelectorAll('.product-card');
            productos.forEach(p => {
                if (p.getAttribute('data-store') === nombreTienda) {
                    p.style.display = "block";
                } else {
                    p.style.display = "none";
                }
            });
            document.getElementById('main-search').value = nombreTienda;
        }

        // 2) Lógica de Mapa y Ubicación
        function abrirMapa(direccion) {
            destinoActual = direccion;
            document.getElementById('map-modal').style.display = "block";
            
            if (!map) {
                map = L.map('map').setView([-25.796, -64.966], 15); // Rosario de la Frontera
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }

            // Intentar GPS Automático al abrir
            obtenerUbicacionGPS();
        }

        function obtenerUbicacionGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    dibujarRuta([lat, lon], destinoActual);
                }, () => {
                    alert("GPS no disponible. Por favor, ingresa tu dirección manualmente.");
                });
            }
        }

        function trazarRutaManual() {
            const direccionOrigen = document.getElementById('manual-address').value;
            if (direccionOrigen) {
                console.log("Trazando ruta desde: " + direccionOrigen + " hasta " + destinoActual);
                // Aquí se integraría el Geocoding para convertir texto a coordenadas
                // Por ahora simulamos el trazado en el mapa
                alert("Calculando ruta desde " + direccionOrigen);
            }
        }

        function cerrarMapa() {
            document.getElementById('map-modal').style.display = "none";
        }

        function filtrarProductos() {
            const query = document.getElementById('main-search').value.toLowerCase();
            const productos = document.querySelectorAll('.product-card');
            productos.forEach(p => {
                const texto = p.innerText.toLowerCase();
                p.style.display = texto.includes(query) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
