<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO.COM - Panel de Control</title>
    <style>
        :root { --primary: #2563eb; --secondary: #059669; --bg: #f8fafc; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        header { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: white; border: 1px solid #ddd; }
        
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .panel { display: none; }
        .panel.active { display: block; }
        
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        
        /* Tabla de Productos */
        .prod-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .prod-table th, .prod-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .prod-img-small { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; }
        .badge-edit { color: var(--primary); cursor: pointer; font-weight: bold; margin-right: 10px; }
        .badge-delete { color: var(--danger); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h2 onclick="location.reload()" style="cursor:pointer; margin:0;">DÓNDE COMPRO.COM</h2>
        <div id="user-info" style="display:flex; align-items:center; gap:10px;">
            <span id="user-email" style="font-weight:700; color: white;"></span>
            <button onclick="logout()" class="btn btn-danger btn-small">Salir</button>
        </div>
    </header>

    <main class="container">
        
        <div id="merchant-panel" class="panel active">
            <div class="card">
                <h3>🏪 Mi Perfil de Comercio</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" id="m-name" placeholder="Nombre Fantasía">
                    <select id="m-rubro-select"></select>
                </div>
                <button onclick="saveMerchantProfile()" class="btn btn-outline" style="width:100%; margin-top:10px;">Guardar Datos del Perfil</button>
            </div>

            <div class="card" style="border-left: 5px solid var(--secondary);">
                <h3>📦 Gestión de Productos</h3>
                <div style="display:grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 10px; align-items: end;">
                    <div>
                        <label style="font-size:0.8rem;">Nombre del Producto</label>
                        <input type="text" id="p-name" placeholder="Ej: Pizza Especial">
                    </div>
                    <div>
                        <label style="font-size:0.8rem;">Precio ($)</label>
                        <input type="number" id="p-price" placeholder="0.00">
                    </div>
                    <div style="margin-bottom:10px;">
                        <label style="font-size:0.8rem;">Imagen (Archivo o URL)</label>
                        <input type="file" id="p-file" accept="image/*" style="font-size:0.7rem;">
                    </div>
                </div>
                <input type="hidden" id="p-edit-id"> <button onclick="saveProduct()" id="btn-save-prod" class="btn btn-secondary" style="width:100%;">
                    ➕ AGREGAR PRODUCTO
                </button>
                <button onclick="cancelEdit()" id="btn-cancel-edit" class="btn btn-outline" style="width:100%; margin-top:5px; display:none;">
                    Cancelar Edición
                </button>
            </div>

            <div class="card">
                <h3>Mi Catálogo</h3>
                <table class="prod-table">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const state = {
            user: sessionStorage.getItem('user'),
            merchants: JSON.parse(localStorage.getItem('dc_merchants')) || {},
            products: JSON.parse(localStorage.getItem('dc_products')) || [],
            rubros: JSON.parse(localStorage.getItem('dc_rubros')) || []
        };

        // --- GESTIÓN DE PRODUCTOS ---

        async function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-file').files[0];
            const editId = document.getElementById('p-edit-id').value;

            if (!name || !price) return alert("Por favor, completa nombre y precio.");

            let imgBase64 = '';
            
            // Si hay un archivo nuevo, lo procesamos
            if (file) {
                imgBase64 = await toBase64(file, 400); // Tamaño mayor para productos
            } else if (editId) {
                // Si estamos editando y no subió imagen nueva, mantenemos la anterior
                const oldProd = state.products.find(p => p.id == editId);
                imgBase64 = oldProd.img;
            }

            if (editId) {
                // Modo Edición
                const index = state.products.findIndex(p => p.id == editId);
                state.products[index] = { ...state.products[index], name, price, img: imgBase64 };
                alert("Producto actualizado");
            } else {
                // Modo Nuevo
                const newProd = {
                    id: Date.now(),
                    owner: state.user,
                    name,
                    price,
                    img: imgBase64
                };
                state.products.push(newProd);
                alert("Producto agregado");
            }

            updateStorage();
            cancelEdit(); // Limpia formulario
            renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            const myProducts = state.products.filter(p => p.owner === state.user);
            
            list.innerHTML = myProducts.map(p => `
                <tr>
                    <td><img src="${p.img || ''}" class="prod-img-small"></td>
                    <td>${p.name}</td>
                    <td>$${p.price}</td>
                    <td>
                        <span class="badge-edit" onclick="editProduct(${p.id})">Editar</span>
                        <span class="badge-delete" onclick="deleteProduct(${p.id})">Borrar</span>
                    </td>
                </tr>
            `).join('');
        }

        function editProduct(id) {
            const p = state.products.find(prod => prod.id == id);
            if (!p) return;

            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-edit-id').value = p.id;
            
            document.getElementById('btn-save-prod').innerText = "💾 ACTUALIZAR PRODUCTO";
            document.getElementById('btn-cancel-edit').style.display = "block";
        }

        function deleteProduct(id) {
            if (confirm("¿Seguro que quieres borrar este producto?")) {
                state.products = state.products.filter(p => p.id != id);
                updateStorage();
                renderInventory();
            }
        }

        function cancelEdit() {
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-file').value = '';
            document.getElementById('p-edit-id').value = '';
            document.getElementById('btn-save-prod').innerText = "➕ AGREGAR PRODUCTO";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        // --- UTILIDADES ---

        function updateStorage() {
            localStorage.setItem('dc_products', JSON.stringify(state.products));
            localStorage.setItem('dc_merchants', JSON.stringify(state.merchants));
        }

        function toBase64(file, size) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        // Mantener proporción o forzar cuadrado según prefieras
                        canvas.width = size; canvas.height = size;
                        ctx.drawImage(img, 0, 0, size, size);
                        resolve(canvas.toDataURL('image/webp', 0.8));
                    };
                };
                reader.readAsDataURL(file);
            });
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        document.addEventListener('DOMContentLoaded', () => {
            if(!state.user) { location.reload(); return; } // Seguridad básica
            document.getElementById('user-email').innerText = state.user;
            
            // Cargar rubros en el selector
            const sel = document.getElementById('m-rubro-select');
            sel.innerHTML = state.rubros.map(r => `<option value="${r.name}">${r.name}</option>`).join('');
            
            // Cargar datos del comercio
            const m = state.merchants[state.user];
            if(m) {
                document.getElementById('m-name').value = m.name || '';
                document.getElementById('m-rubro-select').value = m.rubro || '';
            }

            renderInventory();
        });
    </script>
</body>
</html>
