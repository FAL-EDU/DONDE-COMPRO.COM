<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO - Rosario de la Frontera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .vista { display: none !important; }
        .vista.activa { display: block !important; }
        #mapa-registro { height: 350px; width: 100%; border-radius: 1.5rem; z-index: 10; border: 2px solid #e2e8f0; }
        input:focus { border-color: #4f46e5 !important; ring: 2px #c7d2fe; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-[1001]">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl cursor-pointer tracking-tighter" onclick="verVista('cliente')">📍 DÓNDE COMPRO</h1>
            
            <div id="nav-botones">
                <button id="btn-login" onclick="verVista('login')" class="px-5 py-2 bg-white text-indigo-700 rounded-full text-xs font-black uppercase shadow-md hover:bg-indigo-50 transition">
                    Ingresar
                </button>

                <div id="menu-admin" class="hidden flex gap-2">
                    <button onclick="verVista('cliente')" class="px-3 py-1 bg-indigo-800 rounded-full text-[10px] font-bold uppercase">Inicio</button>
                    <button onclick="verVista('perfil')" class="px-3 py-1 border border-indigo-300 rounded-full text-[10px] font-bold uppercase">Mi Local</button>
                    <button id="btn-sistema" onclick="verVista('sistema')" class="hidden px-3 py-1 bg-slate-900 rounded-full text-[10px] font-bold text-amber-400 uppercase">Sistema</button>
                    <button onclick="location.reload()" class="px-3 py-1 bg-red-500 rounded-full text-[10px] font-bold uppercase">Salir</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        
        <div id="vista-cliente" class="vista activa">
            <div class="max-w-2xl mx-auto mb-10 mt-6 text-center">
                <h2 class="text-3xl font-black text-slate-800 mb-2 tracking-tight uppercase">Rosario de la Frontera</h2>
                <input type="text" id="buscador" onkeyup="filtrar()" placeholder="¿Qué estás buscando?" 
                class="w-full px-8 py-5 rounded-[2.5rem] border-none shadow-2xl text-lg font-semibold outline-none focus:ring-4 focus:ring-indigo-200">
            </div>
            <div id="lista-cliente" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="vista-login" class="vista max-w-md mx-auto mt-20">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center border-t-8 border-indigo-600">
                <div class="mb-8">
                    <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🔑</div>
                    <h2 class="font-black text-2xl uppercase tracking-tighter">Panel de Gestión</h2>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Ingreso para comerciantes</p>
                </div>
                <div class="space-y-4">
                    <input type="text" id="user" placeholder="Usuario" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-2 border-slate-100 outline-none">
                    <input type="password" id="pass" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-2 border-slate-100 outline-none">
                    <button onclick="loginAccion()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 transition">Entrar</button>
                </div>
                <p id="error-msg" class="text-red-500 text-[10px] font-black uppercase mt-4 hidden">⚠️ Credenciales incorrectas</p>
            </div>
        </div>

        <div id="vista-perfil" class="vista max-w-2xl mx-auto">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-t-8 border-emerald-500 mb-6">
                <h2 class="font-black text-xl mb-4 text-emerald-700 uppercase">Información de Mi Local</h2>
                <div id="mapa-registro" class="mb-4"></div>
                <div class="grid gap-3">
                    <input type="text" id="t-nombre" placeholder="Nombre Comercial" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                    <select id="t-rubro" class="p-4 bg-slate-50 border rounded-2xl font-bold"></select>
                    <input type="text" id="t-whatsapp" placeholder="WhatsApp (ej: 5493876123456)" class="p-4 bg-slate-50 border rounded-2xl font-bold text-emerald-600">
                    <input type="hidden" id="t-lat"><input type="hidden" id="t-lng">
                    <button onclick="guardarDatos()" class="bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase">Guardar Cambios</button>
                </div>
            </div>
            
            <div id="area-productos" class="hidden">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-t-8 border-indigo-500 mb-6">
                    <h3 class="font-black text-lg mb-4 uppercase text-indigo-700 text-center">Cargar Nuevo Producto</h3>
                    <div class="grid gap-3">
                        <input type="text" id="p-nombre" placeholder="Nombre del Producto" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="number" id="p-precio" placeholder="Precio $" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="text" id="p-img" placeholder="URL de la imagen" class="p-4 bg-slate-50 border rounded-2xl text-[10px]">
                        <button onclick="crearProducto()" class="bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Publicar</button>
                    </div>
                </div>
                <div id="lista-admin" class="space-y-2 pb-20"></div>
            </div>
        </div>

        <div id="vista-sistema" class="vista max-w-4xl mx-auto">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border-t-8 border-slate-900">
                <h2 class="font-black text-2xl mb-6 uppercase">Control de Comercios</h2>
                <table class="w-full text-left text-xs">
                    <thead><tr class="border-b text-slate-400"><th>Comercio</th><th>Estado</th><th class="text-right">Acción</th></tr></thead>
                    <tbody id="tabla-sistema"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const S_URL = 'https://mefeupfmvhfnnmttpfgq.supabase.co';
        const S_KEY = 'sb_publishable_fMwMKzGhNbj9RyVhPv33sA_rqDg30C7';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        let productosGlobal = [];
        let map, marker;

        // --- NAVEGACIÓN ---
        function verVista(v) {
            document.querySelectorAll('.vista').forEach(el => el.classList.remove('activa'));
            document.getElementById('vista-' + v).classList.add('activa');
            if(v === 'cliente') cargarProductosPublicos();
            if(v === 'perfil') { setTimeout(initMap, 300); cargarDatosLocal(); cargarRubros(); }
            if(v === 'sistema') cargarTablaSistema();
            window.scrollTo(0,0);
        }

        // --- LOGIN CORREGIDO (ADMIN Y COMERCIANTES) ---
        function loginAccion() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const err = document.getElementById('error-msg');

            // Hardcode para el admin principal
            if(u === "admin" && p === "123 admin") {
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('menu-admin').classList.remove('hidden');
                document.getElementById('btn-sistema').classList.remove('hidden');
                verVista('perfil');
            } else {
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        // --- MAPA ---
        function initMap() {
            if (map) return;
            map = L.map('mapa-registro').setView([-25.795, -64.966], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([-25.795, -64.966], {draggable: true}).addTo(map);
            marker.on('dragend', () => {
                document.getElementById('t-lat').value = marker.getLatLng().lat;
                document.getElementById('t-lng').value = marker.getLatLng().lng;
            });
        }

        // --- LÓGICA DE NEGOCIO ---
        async function cargarRubros() {
            const { data } = await _supabase.from('rubros').select('*').order('nombre');
            document.getElementById('t-rubro').innerHTML = '<option value="">Elegir Rubro</option>' + 
                data.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join('');
        }

        async function cargarDatosLocal() {
            const { data } = await _supabase.from('comercios').select('*').limit(1).maybeSingle();
            if(data) {
                document.getElementById('t-nombre').value = data.nombre_comercio || '';
                document.getElementById('t-whatsapp').value = data.whatsapp || '';
                document.getElementById('t-rubro').value = data.rubro || '';
                document.getElementById('area-productos').classList.remove('hidden');
                cargarProductosAdmin(data.id);
            }
        }

        async function guardarDatos() {
            const payload = {
                nombre_comercio: document.getElementById('t-nombre').value,
                rubro: document.getElementById('t-rubro').value,
                whatsapp: document.getElementById('t-whatsapp').value,
                latitud: parseFloat(document.getElementById('t-lat').value) || -25.795,
                longitud: parseFloat(document.getElementById('t-lng').value) || -64.966
            };
            const { data: ex } = await _supabase.from('comercios').select('id').limit(1).maybeSingle();
            if (ex) await _supabase.from('comercios').update(payload).eq('id', ex.id);
            else await _supabase.from('comercios').insert([payload]);
            alert("¡Datos actualizados!");
            cargarDatosLocal();
        }

        async function crearProducto() {
            const { data: tienda } = await _supabase.from('comercios').select('id').limit(1).maybeSingle();
            const prod = {
                nombre_producto: document.getElementById('p-nombre').value,
                precio: parseFloat(document.getElementById('p-precio').value),
                imagen_url: document.getElementById('p-img').value || 'https://via.placeholder.com/400',
                tienda_id: tienda.id
            };
            await _supabase.from('productos').insert([prod]);
            cargarProductosAdmin(tienda.id);
        }

        async function cargarProductosAdmin(tiendaId) {
            const { data } = await _supabase.from('productos').select('*').eq('tienda_id', tiendaId);
            document.getElementById('lista-admin').innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <span class="font-black text-[11px] uppercase">${p.nombre_producto}</span>
                    <button onclick="eliminarProd('${p.id}', '${tiendaId}')" class="text-red-500 font-black text-[10px] px-3">ELIMINAR</button>
                </div>
            `).join('');
        }

        async function eliminarProd(id, tId) {
            await _supabase.from('productos').delete().eq('id', id);
            cargarProductosAdmin(tId);
        }

        // --- PUBLICO ---
        async function cargarProductosPublicos() {
            const { data } = await _supabase.from('productos').select('*, comercios(*)');
            productosGlobal = (data || []).filter(p => p.comercios?.estado === 'activo');
            renderizar(productosGlobal);
        }

        function renderizar(lista) {
            document.getElementById('lista-cliente').innerHTML = lista.map(p => `
                <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100 flex flex-col">
                    <img src="${p.imagen_url}" class="w-full h-44 object-cover">
                    <div class="p-6">
                        <span class="text-[9px] font-black bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full uppercase">${p.comercios?.rubro}</span>
                        <h3 class="font-black text-lg uppercase mt-2 text-slate-800">${p.nombre_producto}</h3>
                        <p class="text-emerald-600 font-black text-2xl mt-1">$${p.precio}</p>
                        <p class="text-[10px] text-slate-400 font-bold mt-2 uppercase">🏪 ${p.comercios?.nombre_comercio}</p>
                        <a href="https://wa.me/${p.comercios?.whatsapp}" target="_blank" class="block mt-4 bg-emerald-500 text-white py-4 rounded-2xl font-black text-xs text-center shadow-lg uppercase">Consultar</a>
                    </div>
                </div>
            `).join('');
        }

        function filtrar() {
            const t = document.getElementById('buscador').value.toLowerCase();
            renderizar(productosGlobal.filter(p => p.nombre_producto.toLowerCase().includes(t) || p.comercios?.nombre_comercio.toLowerCase().includes(t)));
        }

        // --- SISTEMA ---
        async function cargarTablaSistema() {
            const { data } = await _supabase.from('comercios').select('*');
            document.getElementById('tabla-sistema').innerHTML = data.map(t => `
                <tr class="border-b">
                    <td class="p-4 font-bold uppercase">${t.nombre_comercio}</td>
                    <td class="p-4 font-black text-xs ${t.estado==='activo'?'text-emerald-500':'text-amber-500'}">${t.estado || 'pendiente'}</td>
                    <td class="p-4 text-right">
                        <button onclick="activarComercio('${t.id}')" class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg font-black text-[10px] uppercase">Activar</button>
                    </td>
                </tr>
            `).join('');
        }

        async function activarComercio(id) {
            await _supabase.from('comercios').update({ estado: 'activo' }).eq('id', id);
            cargarTablaSistema();
        }

        window.onload = () => verVista('cliente');
    </script>
</body>
</html>
