<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DÓNDE COMPRO.COM - Marketplace Local</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
--primary: #2563eb; --primary-dark: #1d4ed8; --secondary: #059669;
--dark: #1e293b; --light: #f8fafc; --gray: #64748b;
--danger: #dc2626; --warning: #f59e0b;
--shadow: 0 4px 6px -1px rgba(0,0,0,0.1); --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background: var(--light); color: var(--dark); line-height: 1.6; }
header { background: white; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
.logo span { color: var(--warning); }
.container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
.panel { display: none; }
.panel.active { display: block; }
.card { background: white; padding: 1.5rem; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid #eee; }
.btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
.modal-content { background: white; padding: 2rem; border-radius: var(--radius); width: 90%; max-width: 400px; }
input, select, textarea { width: 100%; padding: 0.8rem; border: 1.5px solid #e2e8f0; border-radius: 8px; margin-bottom: 1rem; }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 1rem 2rem; border-radius: 8px; color: white; z-index: 3000; }
</style>
</head>
<body>

<header>
    <a href="#" class="logo" onclick="switchPanel('explore-panel')">DONDE COMPRO<span>.COM</span></a>
    <nav style="display: flex; gap: 1.5rem;">
        <a href="#" onclick="switchPanel('explore-panel')">Explorar</a>
        <a href="#" onclick="openAdminPanel()">Admin</a>
    </nav>
</header>

<div class="container">
    <div id="explore-panel" class="panel active">
        <h2>Comercios en Rosario de la Frontera</h2>
        <div id="grid-items" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;"></div>
    </div>

    <div id="admin-panel" class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Panel de Administración</h2>
            <button class="btn btn-primary" onclick="logout()">Cerrar Sesión</button>
        </div>
        <div class="card">
            <h3>Registrar Comercio</h3>
            <input type="text" id="shop-name" placeholder="Nombre del Comercio">
            <select id="shop-category">
                <option value="Gastronomía">Gastronomía</option>
                <option value="Indumentaria">Indumentaria</option>
                <option value="Ferretería">Ferretería</option>
            </select>
            <textarea id="shop-hours" placeholder="Atención fuera de horario"></textarea>
            <button class="btn btn-primary" style="width: 100%;" onclick="saveShop()">Guardar Comercio</button>
        </div>
    </div>
</div>

<div id="login-modal" class="modal">
    <div class="modal-content">
        <h3>Ingreso Administrativo</h3>
        <input type="email" id="login-email" placeholder="Correo electrónico">
        <input type="password" id="login-password" placeholder="Contraseña">
        <button class="btn btn-primary" style="width: 100%;" onclick="login()">Ingresar</button>
    </div>
</div>

<script>
// 1. CONFIGURACIÓN FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyB3kBkd3pj-o8RPZxXJfOo7GTl64d7un7c",
    authDomain: "donde-compro-12345.firebaseapp.com",
    projectId: "donde-compro-12345",
    storageBucket: "donde-compro-12345.firebasestorage.app",
    messagingSenderId: "769310157775",
    appId: "1:769310157775:web:ab9db00bc911fb3abdc0ba"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Persistencia Offline
db.enablePersistence().catch(err => console.error("Error offline:", err.code));

// Correos Autorizados
const ADMIN_EMAILS = ['admin1@ejemplo.com', 'admin2@ejemplo.com'];

// ===== LÓGICA DE PANELES =====
function switchPanel(panelId) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(panelId).classList.add('active');
}

function openAdminPanel() {
    const user = auth.currentUser;
    if (user && ADMIN_EMAILS.includes(user.email)) {
        switchPanel('admin-panel');
    } else {
        document.getElementById('login-modal').style.display = 'flex';
    }
}

// ===== AUTENTICACIÓN =====
async function login() {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;

    if (!ADMIN_EMAILS.includes(email)) {
        alert("Email no autorizado");
        return;
    }

    try {
        await auth.signInWithEmailAndPassword(email, pass);
        document.getElementById('login-modal').style.display = 'none';
        switchPanel('admin-panel');
    } catch (e) {
        alert("Error de ingreso: " + e.message);
    }
}

async function logout() {
    await auth.signOut();
    switchPanel('explore-panel');
}

// ===== GESTIÓN DE DATOS =====
async function saveShop() {
    const name = document.getElementById('shop-name').value;
    const cat = document.getElementById('shop-category').value;
    const hours = document.getElementById('shop-hours').value;

    try {
        await db.collection('comercios').add({
            nombre: name,
            rubro: cat,
            atencion: hours,
            fecha: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Comercios guardado");
        loadExploreData();
    } catch (e) {
        alert("Error al guardar");
    }
}

function loadExploreData() {
    const grid = document.getElementById('grid-items');
    db.collection('comercios').orderBy('fecha', 'desc').onSnapshot(snapshot => {
        grid.innerHTML = '';
        snapshot.forEach(doc => {
            const d = doc.data();
            grid.innerHTML += `
                <div class="card">
                    <h3>${d.nombre}</h3>
                    <p><strong>${d.rubro}</strong></p>
                    <p>${d.atencion || ''}</p>
                </div>
            `;
        });
    });
}

// Inicializar datos
loadExploreData();
</script>
</body>
</html>
