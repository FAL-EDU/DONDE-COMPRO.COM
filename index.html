<div id="vista-superadmin" class="vista max-w-5xl mx-auto">
    
    <div class="bg-white p-6 rounded-[2rem] shadow-xl mb-8 border-l-8 border-indigo-500">
        <h2 class="font-black text-xl mb-4 uppercase text-indigo-700">📦 Gestión de Rubros</h2>
        <div class="flex gap-2 mb-4">
            <input type="text" id="nuevo-rubro" placeholder="Nombre del nuevo rubro..." class="flex-grow p-3 bg-slate-50 border rounded-xl">
            <button onclick="agregarRubro()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700">Añadir</button>
        </div>
        <div id="lista-rubros" class="flex flex-wrap gap-2"></div>
    </div>

    <div class="bg-white p-6 rounded-[2rem] shadow-xl border-t-8 border-slate-800">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black text-xl uppercase text-slate-800">🏪 Control de Tiendas</h2>
            <button onclick="descargarRegistro()" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-xs font-bold shadow hover:bg-emerald-600">
                📥 DESCARGAR EXCEL (CSV)
            </button>
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="border-b text-slate-400 uppercase text-[10px]">
                        <th class="p-3">Tienda / Inicio</th>
                        <th class="p-3">Rubro</th>
                        <th class="p-3">Estado</th>
                        <th class="p-3 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-tiendas-body"></tbody>
            </table>
        </div>
    </div>
</div>
