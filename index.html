<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONDE COMPRO.COM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #009688;
            --secondary: #673ab7;
            --dark: #1a1a1a;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
        }

        /* HEADER */
        header {
            background: var(--dark);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: bold; font-size: 1.2rem; }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(135deg, var(--primary), #4db6ac);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        /* BUSCADOR */
        .search-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: -30px auto 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .search-box input, .search-box select {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        /* ADMIN PANEL */
        .admin-container {
            display: none;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .grid-admin {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-danger { background: #ff5252; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        
        .status-pending { background: #fff3e0; color: #ef6c00; padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }

        /* MODALES */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">DONDE COMPRO.COM</div>
    <div id="auth-buttons">
        <button class="btn-primary" onclick="showModal('modal-login')">Acceso</button>
        <button class="btn-secondary" id="btn-salir" style="display:none;" onclick="logout()">SALIR</button>
    </div>
</header>

<div id="section-public">
    <div class="hero">
        <h1>¿Qué necesitás comprar?</h1>
        <p>Buscá productos en comercios cercanos a tu ubicación</p>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Buscar producto..." style="width: 60%;">
        <select id="filtro-rubros">
            <option>Todos los rubros</option>
        </select>
        <button class="btn-primary"><i class="fas fa-search"></i> Buscar</button>
    </div>

    <div style="text-align:center; padding: 50px;">
        <img src="https://cdn-icons-png.flaticon.com/512/3081/3081840.png" width="100" alt="bolsas">
        <h2>¡Bienvenido a Dónde Compro!</h2>
        <button class="btn-secondary" onclick="showModal('modal-registro')">Registrar mi comercio</button>
    </div>
</div>

<div id="section-admin" class="admin-container">
    <div class="grid-admin">
        <div class="card">
            <h3>📦 NUEVO RUBRO</h3>
            <input type="text" id="input-nuevo-rubro" placeholder="Ej: Tienda de Ropa" style="width:90%; padding:10px; margin-bottom:10px;">
            <button class="btn-secondary" style="width:100%" onclick="crearRubro()">AGREGAR RUBRO</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <h3>CONTROL DE TIENDAS</h3>
                <button class="btn-primary" style="background:#00c853">EXCEL</button>
            </div>
            <table id="tabla-comercios">
                <thead>
                    <tr>
                        <th>COMERCIO</th>
                        <th>ESTADO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="lista-comercios-admin">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-login" class="modal">
    <div class="card" style="width:350px; text-align:center;">
        <h3>ACCESO ADMIN</h3>
        <input type="password" id="admin-code" placeholder="Código de Invitación" style="width:90%; padding:10px; margin-bottom:15px;">
        <button class="btn-primary" style="width:100%" onclick="loginAdmin()">INGRESAR</button>
        <button onclick="hideModals()" style="background:none; margin-top:10px;">CERRAR</button>
    </div>
</div>

<script>
    // CONFIGURACIÓN SUPABASE
    const S_URL = "https://mefeupfmvhfnnmttpfgq.supabase.co";
    const S_KEY = "sb_publishable_fMwMKzGhNbj9RyVhPv33sA_rqDg30C7";
    const _supabase = supabase.createClient(S_URL, S_KEY);

    // INICIO
    document.addEventListener('DOMContentLoaded', () => {
        cargarRubros();
    });

    // --- FUNCIONES DE NAVEGACIÓN ---
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    function loginAdmin() {
        const code = document.getElementById('admin-code').value;
        if(code === "ADMIN123") { // Aquí puedes usar tu lógica de INV-XXXX
            document.getElementById('section-public').style.display = 'none';
            document.getElementById('section-admin').style.display = 'block';
            document.getElementById('btn-salir').style.display = 'inline-block';
            document.querySelector('.btn-primary').style.display = 'none';
            hideModals();
            cargarComerciosAdmin();
        } else {
            alert("Código incorrecto");
        }
    }

    function logout() {
        location.reload();
    }

    // --- FUNCIONES DE DATOS ---
    async function cargarRubros() {
        const { data } = await _supabase.from('rubros').select('*');
        const select = document.getElementById('filtro-rubros');
        data?.forEach(r => {
            let opt = document.createElement('option');
            opt.value = r.nombre;
            opt.textContent = r.nombre;
            select.appendChild(opt);
        });
    }

    async function crearRubro() {
        const nombre = document.getElementById('input-nuevo-rubro').value;
        const { error } = await _supabase.from('rubros').insert([{ nombre }]);
        if(error) alert("El rubro ya existe o hay error de red"); //
        else location.reload();
    }

    async function cargarComerciosAdmin() {
        const { data } = await _supabase.from('comercios').select('*').order('creado_at', { ascending: false });
        const tbody = document.getElementById('lista-comercios-admin');
        tbody.innerHTML = '';
        
        data?.forEach(c => {
            tbody.innerHTML += `
                <tr>
                    <td>
                        <strong>${c.nombre_comercio}</strong><br>
                        <small style="color:gray">${new Date(c.creado_at).toLocaleDateString()}</small>
                    </td>
                    <td><span class="status-pending">${c.estado}</span></td>
                    <td>
                        <button onclick="validarComercio('${c.id}')" style="color:green; background:none;"><i class="fas fa-check"></i></button>
                        <button onclick="eliminarComercio('${c.id}')" style="color:red; background:none;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    // ELIMINACIÓN CORREGIDA
    async function eliminarComercio(id) {
        if(confirm("¿Estás seguro de eliminar este comercio permanentemente?")) {
            const { error } = await _supabase.from('comercios').delete().eq('id', id);
            if(error) alert("Error al eliminar: " + error.message);
            else cargarComerciosAdmin();
        }
    }
</script>
</body>
</html>
