<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONDE COMPRO.COM - Rosario de la Frontera</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-link.active { border-bottom: 2px solid white; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-black cursor-pointer" onclick="navigate('inicio')">DONDE COMPRO.COM</h1>
            <div id="user-nav" class="flex gap-4 items-center">
                <button onclick="navigate('comerciante')" class="text-sm hover:text-blue-200">Soy Comercio</button>
                <div id="auth-status">
                    </div>
            </div>
        </div>
    </nav>

    <main id="inicio" class="page active container mx-auto p-4">
        <div class="text-center my-10">
            <h2 class="text-4xl font-extrabold text-slate-800">Rosario de la Frontera</h2>
            <p class="text-slate-500">Encuentra todo lo que necesitas en un solo lugar</p>
        </div>
        <div id="grid-comercios" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </main>

    <section id="comerciante" class="page container mx-auto p-4">
        <div class="bg-white rounded-xl shadow-md p-6 max-w-2xl mx-auto">
            <h2 class="text-2xl font-bold mb-6">Panel de Gestión</h2>
            <div id="merchant-tools" class="hidden">
                <p class="mb-4 text-green-600 font-medium">Sesión iniciada como: <span id="user-email"></span></p>
                <button onclick="logout()" class="text-red-500 text-sm underline">Cerrar Sesión</button>
            </div>
            <div id="login-form">
                <h3 class="text-lg mb-4 text-slate-600">Inicia sesión para gestionar tu tienda</h3>
                <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded mb-2">
                <input type="password" id="password" placeholder="Contraseña" class="w-full p-2 border rounded mb-4">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Entrar</button>
            </div>
        </div>
    </section>

    <script>
        // 1. CONFIGURACIÓN DE FIREBASE (Reemplaza con tus datos reales)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "tu-proyecto.firebaseapp.com",
            projectId: "tu-proyecto",
            storageBucket: "tu-proyecto.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. SISTEMA DE NAVEGACIÓN
        function navigate(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        // 3. GESTIÓN DE AUTENTICACIÓN
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    alert("¡Bienvenido!");
                    updateUI(auth.currentUser);
                })
                .catch(err => alert("Error: " + err.message));
        }

        function logout() {
            auth.signOut().then(() => updateUI(null));
        }

        function updateUI(user) {
            const authStatus = document.getElementById('auth-status');
            const merchantTools = document.getElementById('merchant-tools');
            const loginForm = document.getElementById('login-form');

            if (user) {
                authStatus.innerHTML = `<button onclick="navigate('comerciante')" class="bg-blue-800 px-3 py-1 rounded-full text-xs">Mi Cuenta</button>`;
                merchantTools.classList.remove('hidden');
                loginForm.classList.add('hidden');
                document.getElementById('user-email').innerText = user.email;
            } else {
                authStatus.innerHTML = `<button onclick="navigate('comerciante')" class="bg-white text-blue-600 px-3 py-1 rounded-full text-xs font-bold">Ingresar</button>`;
                merchantTools.classList.add('hidden');
                loginForm.classList.remove('hidden');
            }
        }

        // Escuchar cambios de sesión
        auth.onAuthStateChanged(user => updateUI(user));

        // 4. CARGA DE DATOS DESDE FIRESTORE
        async function loadComercios() {
            const grid = document.getElementById('grid-comercios');
            const snapshot = await db.collection('comercios').get();
            
            if(snapshot.empty) {
                grid.innerHTML = '<p class="text-center col-span-3 text-slate-400">No hay comercios registrados aún.</p>';
                return;
            }

            grid.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h3 class="text-xl font-bold">${data.nombre}</h3>
                        <p class="text-blue-600 text-sm font-bold uppercase">${data.rubro}</p>
                    </div>
                `;
            });
        }

        // Carga inicial
        loadComercios();
    </script>
</body>
</html>
