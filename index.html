<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO - Rosario de la Frontera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .vista { display: none !important; }
        .vista.activa { display: block !important; }
        #mapa-registro { height: 300px; width: 100%; border-radius: 1.5rem; z-index: 10; border: 2px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-[1001]">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl cursor-pointer tracking-tighter" onclick="verVista('cliente')">📍 DÓNDE COMPRO</h1>
            
            <div id="btn-login-container">
                <button onclick="verVista('login')" class="px-4 py-1 bg-white text-indigo-700 rounded-full text-xs font-bold uppercase shadow-md">Ingresar</button>
            </div>

            <div id="menu-privado" class="hidden flex gap-2">
                <button onclick="verVista('cliente')" class="px-3 py-1 bg-indigo-800 rounded-full text-[10px] font-bold uppercase">Inicio</button>
                <button onclick="verVista('admin')" class="px-3 py-1 border border-indigo-300 rounded-full text-[10px] font-bold uppercase">Mi Local</button>
                <button onclick="verVista('superadmin')" class="px-3 py-1 bg-slate-900 rounded-full text-[10px] font-bold text-amber-400 uppercase">Admin</button>
                <button onclick="location.reload()" class="px-3 py-1 bg-red-500 rounded-full text-[10px] font-bold uppercase">Salir</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        
        <div id="vista-cliente" class="vista activa">
            <div class="max-w-2xl mx-auto mb-10 mt-6 text-center">
                <h2 class="text-3xl font-black text-slate-800 mb-2 tracking-tight uppercase">Rosario de la Frontera</h2>
                <input type="text" id="buscador" onkeyup="filtrar()" placeholder="¿Qué buscas? (ej: Pan, Farmacia, Coca...)" 
                class="w-full px-8 py-5 rounded-[2rem] border-none shadow-2xl text-lg font-semibold outline-none focus:ring-4 focus:ring-indigo-200">
            </div>
            <div id="lista-cliente" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="vista-login" class="vista max-w-md mx-auto mt-20">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl text-center border-t-8 border-indigo-600">
                <h2 class="font-black text-2xl mb-6 uppercase tracking-tighter">Acceso</h2>
                <div class="space-y-4">
                    <input type="text" id="user" placeholder="Usuario" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none">
                    <input type="password" id="pass" placeholder="Contraseña" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none">
                    <button onclick="intentarLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-indigo-700">Entrar Ahora</button>
                </div>
                <p id="login-error" class="text-red-500 text-xs mt-4 font-bold hidden">Credenciales Incorrectas</p>
            </div>
        </div>

        <div id="vista-admin" class="vista max-w-2xl mx-auto">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl mb-6 border-t-8 border-emerald-500">
                <h2 class="font-black text-xl mb-4 text-emerald-700 uppercase">Panel de Mi Comercio</h2>
                <div id="mapa-registro" class="mb-4"></div>
                <div class="grid gap-3">
                    <input type="text" id="t-nombre" placeholder="Nombre del Local" class="p-3 bg-slate-50 border rounded-xl font-bold">
                    <select id="t-rubro" class="p-3 bg-slate-50 border rounded-xl font-bold"></select>
                    <input type="text" id="t-direccion" placeholder="Dirección" class="p-3 bg-slate-50 border rounded-xl">
                    <input type="text" id="t-whatsapp" placeholder="WhatsApp (Ej: 5493876...)" class="p-3 bg-slate-50 border rounded-xl font-bold text-emerald-600">
                    <input type="hidden" id="t-lat"><input type="hidden" id="t-lng">
                    <button onclick="guardarPerfil()" class="bg-emerald-600 text-white py-4 rounded-xl font-black shadow-lg uppercase">Guardar Perfil</button>
                </div>
            </div>
            
            <div id="seccion-productos" class="hidden">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-t-8 border-indigo-500 mb-6">
                    <h3 class="font-black text-lg mb-4 uppercase">Cargar Producto</h3>
                    <div class="grid gap-2">
                        <input type="text" id="p-nombre" placeholder="Nombre Producto" class="p-3 bg-slate-50 border rounded-xl">
                        <input type="number" id="p-precio" placeholder="Precio $" class="p-3 bg-slate-50 border rounded-xl">
                        <input type="text" id="p-img" placeholder="URL Imagen" class="p-3 bg-slate-50 border rounded-xl text-[10px]">
                        <button onclick="publicar()" class="bg-indigo-600 text-white py-3 rounded-xl font-black uppercase">Publicar</button>
                    </div>
                </div>
                <div id="lista-admin" class="space-y-2 mb-10"></div>
            </div>
        </div>

        <div id="vista-superadmin" class="vista max-w-4xl mx-auto">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border-t-8 border-slate-900">
                <h2 class="font-black text-xl mb-4 uppercase">Tiendas Registradas</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead><tr class="border-b text-slate-400"><th>Local</th><th>Rubro</th><th>Estado</th><th class="text-right">Acción</th></tr></thead>
                        <tbody id="tabla-tiendas-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        const S_URL = 'https://mefeupfmvhfnnmttpfgq.supabase.co';
        const S_KEY = 'sb_publishable_fMwMKzGhNbj9RyVhPv33sA_rqDg30C7';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        let productos = [];
        let mapa, marcador;

        // --- SISTEMA DE VISTAS ---
        function verVista(v) {
            document.querySelectorAll('.vista').forEach(el => el.classList.remove('activa'));
            const destino = document.getElementById('vista-' + v);
            if(destino) destino.classList.add('activa');

            if(v === 'cliente') cargarProductosCliente();
            if(v === 'admin') { setTimeout(initMapa, 300); cargarPerfilInputs(); cargarRubrosSelect(); }
            if(v === 'superadmin') cargarTiendasAdmin();
        }

        // --- LOGIN REAL ---
        function intentarLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const err = document.getElementById('login-error');

            if(u === 'admin' && p === '123 admin') {
                document.getElementById('btn-login-container').classList.add('hidden');
                document.getElementById('menu-privado').classList.remove('hidden');
                verVista('admin');
            } else {
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        // --- MAPA ---
        function initMapa() {
            if (mapa) return;
            mapa = L.map('mapa-registro').setView([-25.795, -64.966], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            marcador = L.marker([-25.795, -64.966], {draggable: true}).addTo(mapa);
            marcador.on('dragend', () => {
                document.getElementById('t-lat').value = marcador.getLatLng().lat;
                document.getElementById('t-lng').value = marcador.getLatLng().lng;
            });
        }

        // --- FUNCIONES SUPER ADMIN ---
        async function cargarTiendasAdmin() {
            const { data } = await _supabase.from('comercios').select('*');
            document.getElementById('tabla-tiendas-body').innerHTML = data.map(t => `
                <tr class="border-b">
                    <td class="p-3 font-bold">${t.nombre_comercio}</td>
                    <td class="p-3">${t.rubro}</td>
                    <td class="p-3 font-black uppercase text-[10px] ${t.estado==='activo'?'text-emerald-500':'text-amber-500'}">${t.estado || 'pendiente'}</td>
                    <td class="p-3 text-right">
                        <button onclick="cambiarEstado('${t.id}', 'activo')" class="bg-emerald-50 text-emerald-600 p-2 rounded-lg">✅ Activar</button>
                    </td>
                </tr>
            `).join('');
        }

        async function cambiarEstado(id, est) {
            await _supabase.from('comercios').update({ estado: est }).eq('id', id);
            cargarTiendasAdmin();
        }

        // --- FUNCIONES COMERCIANTE ---
        async function cargarRubrosSelect() {
            const { data } = await _supabase.from('rubros').select('*').order('nombre');
            const select = document.getElementById('t-rubro');
            if(select && data) {
                select.innerHTML = '<option value="">Seleccionar Rubro...</option>' + 
                    data.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join('');
            }
        }

        async function guardarPerfil() {
            const info = {
                nombre_comercio: document.getElementById('t-nombre').value,
                rubro: document.getElementById('t-rubro').value,
                direccion: document.getElementById('t-direccion').value,
                whatsapp: document.getElementById('t-whatsapp').value,
                latitud: parseFloat(document.getElementById('t-lat').value) || -25.795,
                longitud: parseFloat(document.getElementById('t-lng').value) || -64.966
            };
            const { data: ex } = await _supabase.from('comercios').select('id').limit(1).maybeSingle();
            if (ex) await _supabase.from('comercios').update(info).eq('id', ex.id);
            else await _supabase.from('comercios').insert([info]);
            
            alert("¡Perfil Guardado! Recuerda que el Admin debe activarte.");
            cargarPerfilInputs();
        }

        async function cargarPerfilInputs() {
            const { data } = await _supabase.from('comercios').select('*').limit(1).maybeSingle();
            if(data) {
                document.getElementById('t-nombre').value = data.nombre_comercio || '';
                document.getElementById('t-direccion').value = data.direccion || '';
                document.getElementById('t-whatsapp').value = data.whatsapp || '';
                document.getElementById('seccion-productos').classList.remove('hidden');
                cargarProductosAdmin(data.id);
            }
        }

        async function publicar() {
            const { data: loc } = await _supabase.from('comercios').select('id').limit(1).maybeSingle();
            const p = {
                nombre_producto: document.getElementById('p-nombre').value,
                precio: parseFloat(document.getElementById('p-precio').value),
                imagen_url: document.getElementById('p-img').value || 'https://via.placeholder.com/400',
                tienda_id: loc.id
            };
            await _supabase.from('productos').insert([p]);
            cargarProductosAdmin(loc.id);
        }

        async function cargarProductosAdmin(id) {
            const { data } = await _supabase.from('productos').select('*').eq('tienda_id', id);
            document.getElementById('lista-admin').innerHTML = data.map(p => `
                <div class="bg-white p-3 rounded-xl flex justify-between items-center shadow-sm border">
                    <span class="font-bold text-[10px] uppercase">${p.nombre_producto} - $${p.precio}</span>
                    <button onclick="borrarProd('${p.id}', '${id}')" class="text-red-500 font-bold text-[9px]">BORRAR</button>
                </div>
            `).join('');
        }

        async function borrarProd(id, tId) {
            await _supabase.from('productos').delete().eq('id', id);
            cargarProductosAdmin(tId);
        }

        // --- FUNCIONES CLIENTE ---
        async function cargarProductosCliente() {
            const { data } = await _supabase.from('productos').select('*, comercios(*)');
            productos = (data || []).filter(p => p.comercios?.estado === 'activo');
            renderCliente();
        }

        function renderCliente(lista = productos) {
            document.getElementById('lista-cliente').innerHTML = lista.map(p => `
                <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100 flex flex-col">
                    <img src="${p.imagen_url}" class="w-full h-44 object-cover">
                    <div class="p-6 text-center">
                        <span class="text-[8px] font-black bg-indigo-50 text-indigo-700 px-2 py-1 rounded-full uppercase">${p.comercios?.rubro}</span>
                        <h3 class="font-black text-lg uppercase mt-2 leading-tight">${p.nombre_producto}</h3>
                        <p class="text-emerald-600 font-black text-2xl">$${p.precio}</p>
                        <p class="text-[9px] text-slate-400 font-bold mt-2">🏪 ${p.comercios?.nombre_comercio}</p>
                        <a href="https://wa.me/${p.comercios?.whatsapp}" target="_blank" class="block mt-4 bg-emerald-500 text-white py-3 rounded-2xl font-black text-xs uppercase shadow-lg">WhatsApp</a>
                    </div>
                </div>
            `).join('');
        }

        function filtrar() {
            const t = document.getElementById('buscador').value.toLowerCase();
            renderCliente(productos.filter(p => p.nombre_producto.toLowerCase().includes(t) || p.comercios?.nombre_comercio.toLowerCase().includes(t)));
        }

        window.onload = () => verVista('cliente');
    </script>
</body>
</html>
