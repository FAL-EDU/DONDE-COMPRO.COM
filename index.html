<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONDE COMPRO.COM | Rosario de la Frontera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f3f7f6; }
        .vista { display: none; }
        .vista.active { display: block; }
        .tab-active { border-bottom: 3px solid #0d9488; color: #0d9488; }
        .card-custom { border-radius: 2.5rem; transition: transform 0.2s; }
        .card-custom:hover { transform: translateY(-5px); }
        #mapa-registro { height: 300px; width: 100%; border-radius: 1.5rem; }
    </style>
</head>
<body>

    <nav class="bg-[#1a1a1a] text-white p-4 sticky top-0 z-[1000] shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tighter cursor-pointer" onclick="verVista('home')">DONDE COMPRO.COM</h1>
            <div id="nav-botones">
                <button onclick="abrirModal()" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2 rounded-xl text-xs font-bold uppercase flex items-center gap-2">
                    <span>→</span> Acceso
                </button>
            </div>
        </div>
    </nav>

    <div id="vista-home" class="vista active">
        <header class="bg-[#0d9488] p-12 text-center text-white">
            <div class="max-w-3xl mx-auto">
                <h2 class="text-4xl font-extrabold mb-4 uppercase italic tracking-tight">¿Qué necesitás comprar?</h2>
                <p class="text-sm opacity-90 mb-8 font-medium">Buscá productos en comercios de Rosario de la Frontera</p>
                
                <div class="bg-white p-2 rounded-[2rem] shadow-2xl flex flex-col md:flex-row gap-2">
                    <input type="text" id="buscador" onkeyup="filtrarHome()" placeholder="Ej: Pan, Leche, Pañales..." class="flex-1 p-4 text-slate-700 outline-none rounded-2xl font-bold">
                    <button onclick="filtrarHome()" class="bg-[#1a1a1a] text-white px-10 py-4 rounded-2xl font-black uppercase text-sm">Buscar</button>
                </div>
                
                <div class="flex justify-center gap-6 mt-6 text-[10px] font-black uppercase tracking-widest">
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="accent-amber-500"> Abierto ahora</label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="accent-amber-500"> Solo cercanos</label>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-8">
            <div id="contenedor-comercios" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
                </div>
        </main>
    </div>

    <div id="vista-admin" class="vista max-w-6xl mx-auto p-6">
        <div class="flex flex-col md:flex-row gap-8 mt-10">
            <div class="md:w-1/3 space-y-6">
                <div class="bg-white p-8 card-custom shadow-lg border-t-4 border-indigo-500">
                    <h3 class="font-black text-slate-800 uppercase text-sm mb-4">📦 Nuevo Rubro</h3>
                    <input type="text" id="input-nuevo-rubro" placeholder="Nombre del rubro" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none mb-4 font-bold">
                    <button onclick="crearRubro()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-[10px]">Agregar Rubro</button>
                </div>
            </div>
            <div class="md:w-2/3 bg-white p-8 card-custom shadow-2xl">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="font-black text-slate-800 uppercase italic">Control de Tiendas</h3>
                    <button class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-emerald-100">Excel</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] text-slate-400 font-black uppercase border-b">
                                <th class="pb-4">Comercio</th>
                                <th class="pb-4 text-center">Estado</th>
                                <th class="pb-4 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-admin-comercios"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-acceso" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[3rem] overflow-hidden shadow-2xl relative">
            <button onclick="cerrarModal()" class="absolute top-8 right-8 text-slate-300 hover:text-slate-600 text-3xl">&times;</button>
            <div class="p-10">
                <div class="flex border-b border-slate-100 mb-8 text-[10px] font-black uppercase tracking-tighter">
                    <button id="tab-login" onclick="cambiarTab('login')" class="flex-1 pb-4 tab-active">Iniciar Sesión</button>
                    <button id="tab-registro" onclick="cambiarTab('registro')" class="flex-1 pb-4">Registrar Local</button>
                    <button id="tab-admin" onclick="cambiarTab('admin')" class="flex-1 pb-4">Admin</button>
                </div>

                <div id="form-login" class="space-y-4">
                    <input type="text" id="log-user" placeholder="Usuario / Email" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold">
                    <input type="password" id="log-pass" placeholder="Contraseña" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold">
                    <button class="w-full bg-[#0d9488] text-white py-5 rounded-2xl font-black uppercase shadow-lg">Entrar</button>
                </div>

                <div id="form-registro" class="hidden space-y-3">
                    <input type="text" id="reg-nombre" placeholder="Nombre del comercio" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    <select id="reg-rubro" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-slate-400"></select>
                    <input type="text" id="reg-whatsapp" placeholder="WhatsApp (Ej: 5493876...)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 text-[10px] font-bold text-amber-700 uppercase">Su comercio quedará en revisión</div>
                    <button onclick="solicitarRegistro()" class="w-full bg-[#0d9488] text-white py-5 rounded-2xl font-black uppercase shadow-lg">Enviar Solicitud</button>
                </div>

                <div id="form-admin" class="hidden space-y-4 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Ingrese Código de Invitación</p>
                    <input type="text" id="codigo-inv" placeholder="DONDECOMPRO-XXXX" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-mono text-center font-bold border-2 border-dashed border-slate-200">
                    <button onclick="validarAdmin()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg">Acceder al Sistema</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE (Coloca tus datos aquí)
        const S_URL = "https://mefeupfmvhfnnmttpfgq.supabase.co"; 
        const S_KEY = "sb_publishable_fMwMKzGhNbj9RyVhPv33sA_rqDg30C7"; 
        const _supabase = supabase.createClient(S_URL, S_KEY);

        // NAVEGACIÓN
        function verVista(id) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('active'));
            document.getElementById('vista-' + id).classList.add('active');
            if(id === 'admin') cargarAdmin();
            if(id === 'home') cargarHome();
        }

        function abrirModal() { document.getElementById('modal-acceso').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modal-acceso').classList.add('hidden'); }

        function cambiarTab(tipo) {
            ['login', 'registro', 'admin'].forEach(t => {
                document.getElementById('tab-' + t).classList.remove('tab-active');
                document.getElementById('form-' + t).classList.add('hidden');
            });
            document.getElementById('tab-' + tipo).classList.add('tab-active');
            document.getElementById('form-' + tipo).classList.remove('hidden');
            if(tipo === 'registro') cargarRubros();
        }

        // ACCESO ADMIN POR CÓDIGO
        function validarAdmin() {
            const cod = document.getElementById('codigo-inv').value.trim();
            if(cod === "DONDECOMPRO-ADMIN-2026") {
                cerrarModal();
                document.getElementById('nav-botones').innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="verVista('admin')" class="px-4 py-2 bg-amber-400 text-slate-900 rounded-xl text-[10px] font-black uppercase">Admin</button>
                        <button onclick="location.reload()" class="px-4 py-2 bg-red-500 text-white rounded-xl text-[10px] font-black uppercase">Salir</button>
                    </div>
                `;
                verVista('admin');
            } else {
                alert("Código Inválido");
            }
        }

        // LOGICA DE DATOS
        async function cargarRubros() {
            const { data } = await _supabase.from('rubros').select('*');
            if(data) {
                const select = document.getElementById('reg-rubro');
                select.innerHTML = '<option disabled selected>Seleccione Rubro</option>' + 
                                   data.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join('');
            }
        }

        async function solicitarRegistro() {
            const payload = {
                nombre_comercio: document.getElementById('reg-nombre').value,
                rubro: document.getElementById('reg-rubro').value,
                whatsapp: document.getElementById('reg-whatsapp').value,
                estado: 'pendiente'
            };
            const { error } = await _supabase.from('comercios').insert([payload]);
            if(!error) { alert("Solicitud Enviada"); cerrarModal(); }
        }

        async function cargarAdmin() {
            const { data } = await _supabase.from('comercios').select('*').order('creado_at', { ascending: false });
            const tabla = document.getElementById('tabla-admin-comercios');
            tabla.innerHTML = data.map(t => `
                <tr class="border-b border-slate-50">
                    <td class="py-5">
                        <div class="font-bold text-slate-700 uppercase text-xs">${t.nombre_comercio}</div>
                        <div class="text-[9px] text-slate-400 italic">${new Date(t.creado_at).toLocaleDateString()}</div>
                    </td>
                    <td class="text-center">
                        <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${t.estado === 'activo' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-600'}">
                            ${t.estado}
                        </span>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="aprobar('${t.id}')" class="bg-slate-100 p-2 rounded-xl text-green-600 hover:bg-green-600 hover:text-white transition-all">✔</button>
                            <button onclick="borrar('${t.id}')" class="bg-slate-100 p-2 rounded-xl text-red-400 hover:bg-red-500 hover:text-white transition-all">🗑</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function aprobar(id) {
            await _supabase.from('comercios').update({ estado: 'activo' }).eq('id', id);
            cargarAdmin();
        }

        async function borrar(id) {
            if(confirm("¿Eliminar comercio?")) {
                await _supabase.from('comercios').delete().eq('id', id);
                cargarAdmin();
            }
        }

        async function cargarHome() {
            const { data } = await _supabase.from('comercios').select('*').eq('estado', 'activo');
            const contenedor = document.getElementById('contenedor-comercios');
            contenedor.innerHTML = data.map(t => `
                <div class="bg-white p-6 card-custom shadow-xl text-center border border-slate-100">
                    <div class="text-3xl mb-4">🏪</div>
                    <h4 class="font-black text-slate-800 uppercase text-sm mb-1">${t.nombre_comercio}</h4>
                    <p class="text-[10px] text-indigo-600 font-bold uppercase mb-4 tracking-widest">${t.rubro}</p>
                    <a href="https://wa.me/${t.whatsapp}" target="_blank" class="block bg-emerald-500 text-white py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-emerald-100">WhatsApp</a>
                </div>
            `).join('');
        }

        window.onload = cargarHome;
    </script>
</body>
</html>
