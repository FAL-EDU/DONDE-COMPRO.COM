<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DÓNDE COMPRO.COM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Estilos básicos para que la App se vea bien */
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f4f9; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 15px; border-radius: 8px; color: white; z-index: 10000; transition: 0.3s; }
        .toast.success { background: #059669; }
        .toast.error { background: #dc2626; }
        .toast.info { background: #3b82f6; }
        #map { height: 300px; width: 100%; border-radius: 12px; margin: 10px 0; }
        .hidden { display: none; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 1000; justify-content:center; align-items:center; }
        .modal.active { display: flex; }
        .panel { display: none; padding: 20px; }
        .panel.active { display: block; }
    </style>
</head>
<body>

    <header style="background: #2563eb; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
        <h1 id="platform-logo">DÓNDE COMPRO.COM</h1>
        <nav>
            <button onclick="openLoginModal('merchant')" id="login-btn">🏪 Ingreso Comercio</button>
            <div id="user-badge" class="hidden">
                <span id="user-display"></span>
                <button onclick="logout()">Cerrar Sesión</button>
            </div>
        </nav>
    </header>

    <div id="header-watermark" style="height: 100px; display:none; background-size: cover;"></div>

    <div id="client-panel" class="panel active">
        <div id="user-location">📍 Detectando ubicación...</div>
        <div id="map"></div>
        <div id="products-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">
            </div>
    </div>

    <div id="merchant-panel" class="panel">
        <h2>Panel de Inventario</h2>
        <input type="hidden" id="merchant-email-display">
        <button onclick="openProductModal()">➕ Agregar Producto</button>
        <table style="width:100%; margin-top: 20px;">
            <thead>
                <tr><th>Producto</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
            </thead>
            <tbody id="inventory-body"></tbody>
        </table>
        <button onclick="switchPanel('client-panel')">Volver al Inicio</button>
    </div>

    <div id="login-modal" class="modal">
        <div style="background:white; padding:20px; border-radius:8px; width:300px;">
            <h3 id="login-title">Ingreso</h3>
            <input type="email" id="login-email" placeholder="Email" style="width:100%; margin-bottom:10px;">
            <input type="password" id="login-password" placeholder="Contraseña" style="width:100%; margin-bottom:10px;">
            <button onclick="login()" style="width:100%; background:#2563eb; color:white; padding:10px; border:none; border-radius:5px;">Entrar</button>
            <button onclick="closeLoginModal()" style="width:100%; margin-top:10px; background:none; border:none; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="product-modal" class="modal">
        <div style="background:white; padding:20px; border-radius:8px; width:300px;">
            <h3>Datos del Producto</h3>
            <input type="text" id="product-name" placeholder="Nombre" style="width:100%; margin-bottom:10px;">
            <input type="number" id="product-price" placeholder="Precio" style="width:100%; margin-bottom:10px;">
            <input type="number" id="product-stock" placeholder="Stock" style="width:100%; margin-bottom:10px;">
            <select id="product-category" style="width:100%; margin-bottom:10px;"></select>
            <button onclick="saveProduct()" style="width:100%; background:#059669; color:white; padding:10px; border:none; border-radius:5px;">Guardar</button>
            <button onclick="closeProductModal()" style="width:100%; margin-top:10px; background:none; border:none;">Cerrar</button>
        </div>
    </div>

    <script>
        // ===== ESTADO =====
        const state = {
            currentUser: null,
            currentRole: null,
            products: [],
            cart: [],
            orders: [],
            currentProduct: null,
            platformLogo: null,
            platformWatermark: null,
            userLocation: null,
            map: null,
            mapMarkers: [],
            categories: []
        };

        // ===== INICIALIZACIÓN =====
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            checkSession();
            initMap();
            getUserLocation();
            loadCategories();
            populateCategoryDropdowns();
            renderProducts(state.products);
            setupEventListeners();
        });

        // ===== MAPA =====
        function initMap() {
            state.map = L.map('map').setView([-34.6037, -58.3816], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(state.map);
        }

        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        state.userLocation = {lat: position.coords.latitude, lng: position.coords.longitude};
                        document.getElementById('user-location').textContent = `📍 Lat: ${state.userLocation.lat.toFixed(4)}, Lng: ${state.userLocation.lng.toFixed(4)}`;
                        state.map.setView([state.userLocation.lat, state.userLocation.lng], 13);
                        L.marker([state.userLocation.lat, state.userLocation.lng]).addTo(state.map).bindPopup('📍 Tu ubicación').openPopup();
                    },
                    () => { document.getElementById('user-location').textContent = '📍 Ubicación no disponible'; }
                );
            }
        }

        // ===== AUTH =====
        let loginType = 'merchant';

        function openLoginModal(type) {
            loginType = type;
            document.getElementById('login-title').textContent = type === 'admin' ? '🛡️ Admin' : '🏪 Comerciante';
            document.getElementById('login-modal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('login-modal').classList.remove('active');
        }

        function login() {
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showToast('⚠️ Completá datos', 'error');
                return;
            }

            // AHORA PERMITE GITHUB Y LOCALHOST
            const host = window.location.hostname;
            if (host === 'localhost' || host === 'fal-edu.github.io' || host === '127.0.0.1') {
                state.currentUser = email;
                state.currentRole = loginType;
                sessionStorage.setItem('dc_user', email);
                sessionStorage.setItem('dc_role', loginType);
                updateUserUI();
                closeLoginModal();
                showToast('✅ Bienvenido', 'success');
                if (loginType === 'merchant') {
                    document.getElementById('merchant-email-display').value = email;
                    switchPanel('merchant-panel');
                    renderInventory();
                }
            }
        }

        function logout() {
            state.currentUser = null;
            sessionStorage.clear();
            updateUserUI();
            switchPanel('client-panel');
            showToast('👋 Sesión cerrada', 'info');
        }

        function checkSession() {
            const user = sessionStorage.getItem('dc_user');
            const role = sessionStorage.getItem('dc_role');
            if (user && role) {
                state.currentUser = user;
                state.currentRole = role;
                updateUserUI();
            }
        }

        function updateUserUI() {
            const badge = document.getElementById('user-badge');
            const loginBtn = document.getElementById('login-btn');
            if (state.currentUser) {
                badge.classList.remove('hidden');
                document.getElementById('user-display').textContent = state.currentUser;
                loginBtn.classList.add('hidden');
            } else {
                badge.classList.add('hidden');
                loginBtn.classList.remove('hidden');
            }
        }

        // ===== NAVEGACIÓN =====
        function switchPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        // ===== PRODUCTOS & INVENTARIO =====
        function saveProduct() {
            const product = {
                id: Date.now(),
                name: document.getElementById('product-name').value,
                price: parseFloat(document.getElementById('product-price').value),
                stock: parseInt(document.getElementById('product-stock').value),
                category: document.getElementById('product-category').value,
                owner: state.currentUser,
                store: 'Mi Comercio'
            };
            state.products.push(product);
            localStorage.setItem('dc_products', JSON.stringify(state.products));
            renderInventory();
            renderProducts(state.products);
            closeProductModal();
            showToast('✅ Guardado', 'success');
        }

        function renderInventory() {
            const tbody = document.getElementById('inventory-body');
            const myProducts = state.products.filter(p => p.owner === state.currentUser);
            tbody.innerHTML = myProducts.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>$${p.price}</td>
                    <td>${p.stock}</td>
                    <td><button onclick="deleteProduct(${p.id})">🗑️</button></td>
                </tr>
            `).join('');
        }

        function deleteProduct(id) {
            state.products = state.products.filter(p => p.id !== id);
            localStorage.setItem('dc_products', JSON.stringify(state.products));
            renderInventory();
            renderProducts(state.products);
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div style="background:white; padding:10px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                    <h4>${p.name}</h4>
                    <p style="color:#059669; font-weight:bold;">$${p.price}</p>
                    <small>Tienda: ${p.store}</small>
                </div>
            `).join('');
        }

        // ===== CATEGORIAS =====
        function loadCategories() {
            state.categories = [
                {id: 'food', name: 'Alimentos'},
                {id: 'pharmacy', name: 'Farmacia'},
                {id: 'electronics', name: 'Electrónica'}
            ];
        }

        function populateCategoryDropdowns() {
            const product = document.getElementById('product-category');
            product.innerHTML = state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function loadData() {
            const saved = localStorage.getItem('dc_products');
            state.products = saved ? JSON.parse(saved) : [];
        }

        function showToast(msg, type='info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function setupEventListeners() {
            document.querySelectorAll('.modal').forEach(m => {
                m.onclick = e => { if (e.target === m) m.classList.remove('active'); };
            });
        }
    </script>
</body>
</html>
