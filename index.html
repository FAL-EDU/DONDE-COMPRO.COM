
<div id="modal-login" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h3>Mi Tienda</h3><br>
        <label>Nombre de la tienda:</label>
        <input type="text" id="log-nombre" placeholder="Ej: Panadería El Sol">
        <label>Contraseña:</label>
        <input type="password" id="log-pass" placeholder="Tu clave de acceso">
        <button class="btn btn-primary" style="width:100%" onclick="accederTienda()">INGRESAR</button>
        <hr style="margin:20px 0">
        <p>¿No estás registrado?</p>
        <button class="btn btn-secondary" style="width:100%" onclick="cerrarModal('modal-login'); abrirModal('modal-registro')">Solicitar Registro</button>
    </div>
</div>

<div id="modal-registro" class="modal">
    <div class="modal-content" style="max-width: 450px;">
        <h3>Registro de Nuevo Comercio</h3><br>
        <label>Nombre del Local:</label>
        <input type="text" id="reg-nombre" placeholder="Ej: Panadería El Sol">
        <label>Rubro:</label>
        <select id="reg-rubro"></select>
        <label>Crea tu Clave de Acceso:</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 4 caracteres">
        
        <button class="btn btn-primary" style="width:100%" onclick="registrarTienda()">Enviar Solicitud</button>
        <button class="btn" style="width:100%; margin-top:10px" onclick="cerrarModal('modal-registro')">Volver</button>
    </div>
</div>

<script>
// --- BUSCA Y REEMPLAZA ESTAS FUNCIONES EN TU <SCRIPT> ---

function registrarTienda() {
    const n = document.getElementById('reg-nombre').value.trim();
    const r = document.getElementById('reg-rubro').value;
    const p = document.getElementById('reg-pass').value; // Captura la clave [cite: 110]

    if(!n || !p) return alert("El nombre y la contraseña son obligatorios");
    if(p.length < 4) return alert("La contraseña debe tener al menos 4 caracteres");

    // Guardamos la clave en el objeto del comercio [cite: 255]
    db.comercios.push({ 
        id: Date.now(), 
        nombre: n, 
        rubro: r, 
        pass: p, // Se almacena aquí
        estado: 'pendiente', 
        tel:'', 
        dir:'', 
        imgLocal:'', 
        hor:'', 
        prods:[] 
    });
    
    salvar(); 
    alert("Solicitud enviada. Podrás ingresar cuando el administrador te autorice."); 
    cerrarModal('modal-registro');
    // Limpiamos campos
    document.getElementById('reg-nombre').value = "";
    document.getElementById('reg-pass').value = "";
}

function accederTienda() {
    const n = document.getElementById('log-nombre').value.trim().toLowerCase();
    const p = document.getElementById('log-pass').value; // Captura la clave ingresada [cite: 100]
    
    // Buscamos el comercio por nombre [cite: 260]
    const c = db.comercios.find(i => i.nombre.toLowerCase() === n);

    if(!c) return alert("Comercio no encontrado.");
    
    // Verificamos si está activo [cite: 261]
    if(c.estado !== 'activo') return alert("Tu tienda aún está pendiente de autorización.");

    // VALIDACIÓN DE CONTRASEÑA
    if(c.pass === p) {
        tActiva = c; [cite: 262]
        document.getElementById('lbl-nombre-tienda').innerText = "Panel: " + c.nombre; [cite: 263]
        document.getElementById('t-tel').value = c.tel;
        document.getElementById('t-dir').value = c.dir;
        document.getElementById('t-img').value = c.imgLocal;
        document.getElementById('t-hor').value = c.hor;
        renderProds(); [cite: 268]
        cerrarModal('modal-login'); [cite: 269]
        abrirModal('modal-panel-tienda'); [cite: 270]
        // Limpiamos el campo de pass por seguridad
        document.getElementById('log-pass').value = "";
    } else {
        alert("Contraseña incorrecta.");
    }
}
</script>
