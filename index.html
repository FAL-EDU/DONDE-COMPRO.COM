<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DondeCompro.com | Rosario de la Frontera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .modal-blur { backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.6); }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 255, 255, 0.2); }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <span class="text-white font-black text-xl">D</span>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tighter">DONDECOMPRO<span class="text-indigo-600">.COM</span></h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em]">Rosario de la Frontera</p>
                </div>
            </div>
            <button onclick="abrirModal()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-indigo-600 transition-all">Acceso / Registro</button>
        </div>
    </nav>

    <main id="admin-panel" class="hidden max-w-7xl mx-auto p-8 animate-in fade-in duration-500">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                <h3 class="text-xs font-black text-indigo-500 uppercase mb-6">📦 Gestionar Rubros</h3>
                <div class="space-y-4">
                    <input type="text" id="nuevo-rubro" placeholder="Nombre del rubro" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-indigo-500 font-bold">
                    <button onclick="crearRubro()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-indigo-100">Agregar Rubro</button>
                </div>
                <div id="lista-rubros" class="mt-8 space-y-2 max-h-64 overflow-y-auto"></div>
            </div>

            <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest">Control de Tiendas</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <tbody id="tabla-comercios" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-container" class="fixed inset-0 z-50 hidden modal-blur flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl animate-in zoom-in duration-300">
            <div class="p-8 pb-4 flex justify-between items-center">
                <h2 class="text-xl font-extrabold text-slate-800">Bienvenido</h2>
                <button onclick="cerrarModal()" class="text-slate-300 hover:text-slate-500 text-2xl font-bold">&times;</button>
            </div>

            <div class="flex px-8 border-b border-slate-100 mb-8">
                <button id="tab-reg" onclick="switchTab('registro')" class="flex-1 py-4 text-xs font-black uppercase tracking-widest tab-active">Registrar Local</button>
                <button id="tab-adm" onclick="switchTab('admin')" class="flex-1 py-4 text-xs font-black uppercase tracking-widest text-slate-400">Admin</button>
            </div>

            <div class="p-8 pt-0 space-y-4">
                <div id="form-registro" class="space-y-4">
                    <input type="text" id="reg-nombre" placeholder="Nombre del Comercio" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border font-bold">
                    <select id="reg-rubro" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border font-bold text-slate-500"></select>
                    <input type="text" id="reg-whatsapp" placeholder="WhatsApp (Ej: 3876...)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border font-bold">
                    <button onclick="enviarSolicitud()" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg shadow-emerald-100">Enviar Solicitud</button>
                </div>

                <div id="form-admin" class="hidden space-y-4">
                    <p class="text-[10px] text-slate-400 font-bold uppercase text-center mb-4 italic">Solo personal autorizado</p>
                    <input type="password" id="admin-pass" placeholder="PIN de Seguridad" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border text-center text-xl tracking-widest font-black">
                    <button onclick="accederAdmin()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-xl">Acceder al Panel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE (PONER TUS DATOS AQUÍ)
        const URL_SB = "TU_URL";
        const KEY_SB = "TU_KEY";
        const _sb = supabase.createClient(URL_SB, KEY_SB);

        // MODAL LOGIC
        function abrirModal() { 
            document.getElementById('modal-container').classList.remove('hidden');
            cargarRubrosSelector(); // Carga rubros antes de mostrar el modal
        }
        function cerrarModal() { document.getElementById('modal-container').classList.add('hidden'); }
        
        function switchTab(t) {
            const isReg = t === 'registro';
            document.getElementById('form-registro').classList.toggle('hidden', !isReg);
            document.getElementById('form-admin').classList.toggle('hidden', isReg);
            document.getElementById('tab-reg').className = isReg ? 'flex-1 py-4 text-xs font-black uppercase tracking-widest tab-active' : 'flex-1 py-4 text-xs font-black uppercase tracking-widest text-slate-400';
            document.getElementById('tab-adm').className = !isReg ? 'flex-1 py-4 text-xs font-black uppercase tracking-widest tab-active' : 'flex-1 py-4 text-xs font-black uppercase tracking-widest text-slate-400';
        }

        // DATA LOGIC
        async function cargarRubrosSelector() {
            const { data } = await _sb.from('rubros').select('nombre');
            const sel = document.getElementById('reg-rubro');
            sel.innerHTML = '<option value="">Seleccionar Rubro...</option>' + 
                data.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join('');
        }

        async function enviarSolicitud() {
            const n = document.getElementById('reg-nombre').value;
            const r = document.getElementById('reg-rubro').value;
            const w = document.getElementById('reg-whatsapp').value;
            if(!n || !r || !w) return alert("Faltan datos"); // Solución

            const { error } = await _sb.from('comercios').insert([{ nombre_comercio: n, rubro_nombre: r, whatsapp: w }]);
            if(error) alert("Error al enviar: " + error.message);
            else { alert("¡Solicitud recibida! El administrador te activará pronto."); cerrarModal(); }
        }

        async function accederAdmin() {
            if(document.getElementById('admin-pass').value === "2026") {
                cerrarModal();
                document.getElementById('admin-panel').classList.remove('hidden');
                cargarAdminData();
            } else { alert("Acceso Denegado"); }
        }

        async function cargarAdminData() {
            const { data: coms } = await _sb.from('comercios').select('*').order('creado_at', {ascending: false});
            const { data: rubs } = await _sb.from('rubros').select('*');
            
            // Render Rubros
            document.getElementById('lista-rubros').innerHTML = rubs.map(r => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl group">
                    <span class="font-bold text-slate-700 text-sm">${r.nombre}</span>
                    <button onclick="eliminarRubro('${r.id}')" class="text-slate-300 hover:text-red-500 font-bold opacity-0 group-hover:opacity-100 transition-all">&times;</button>
                </div>
            `).join('');

            // Render Comercios
            document.getElementById('tabla-comercios').innerHTML = coms.map(c => `
                <tr class="group">
                    <td class="py-6">
                        <div class="font-black text-slate-800 text-xs uppercase tracking-tight">${c.nombre_comercio}</div>
                        <div class="text-[10px] font-bold text-indigo-400 italic">${c.rubro_nombre} • WA: ${c.whatsapp}</div>
                    </td>
                    <td>
                        <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${c.estado === 'activo' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${c.estado}</span>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="actualizarEstado('${c.id}', 'activo')" class="bg-slate-900 text-white p-2 rounded-lg text-xs">✓</button>
                            <button onclick="eliminarComercio('${c.id}')" class="text-slate-300 hover:text-red-500 p-2 text-lg">🗑</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function crearRubro() {
            const n = document.getElementById('nuevo-rubro').value;
            const { error } = await _sb.from('rubros').insert([{ nombre: n }]);
            if(error) alert("El rubro ya existe"); //
            else { document.getElementById('nuevo-rubro').value = ""; cargarAdminData(); }
        }

        async function actualizarEstado(id, est) {
            await _sb.from('comercios').update({ estado: est }).eq('id', id);
            cargarAdminData();
        }

        async function eliminarComercio(id) {
            if(confirm("¿Eliminar local?")) {
                await _sb.from('comercios').delete().eq('id', id);
                cargarAdminData();
            }
        }
    </script>
</body>
</html>
